<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 管理中心</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#656d76;--accent:#f0883e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* TICKER */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:38px;position:sticky;top:0;z-index:100;display:flex;align-items:center;}
.ticker-pill{flex-shrink:0;background:var(--accent);color:#000;font-weight:700;font-size:11px;padding:3px 12px;margin-left:12px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.ticker-area{flex:1;overflow:hidden;height:100%;}
.ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll 60s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;padding:0 20px;border-right:1px solid var(--border);font-size:12px;font-family:'JetBrains Mono',monospace;}
.ti-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.ti-tag.ar{background:rgba(63,185,80,.2);color:var(--green);}
.ti-tag.ap{background:rgba(248,81,73,.2);color:var(--red);}
.ti-tag.etd{background:rgba(88,166,255,.2);color:var(--blue);}
.ti-tag.eta{background:rgba(210,153,34,.2);color:var(--yellow);}
.ti-today{color:var(--accent);font-size:10px;}
.ti-tmr{color:var(--green);font-size:10px;}

/* HEADER */
.hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.hdr-t{font-size:18px;font-weight:700;}
.hdr-d{color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{border-color:var(--blue);}
.rtime{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
.tab{padding:11px 18px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--blue);}
.badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;min-width:18px;text-align:center;}
.badge.hot{background:var(--red);color:#fff;}
.badge.ok{background:var(--green);color:#000;}
.badge.zero{background:var(--bg3);color:var(--text3);}

/* PANE */
.pane{display:none;padding:20px 24px;}
.pane.active{display:block;}

/* CARDS */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.card.today{border-left:3px solid var(--accent);}
.card.tmr{border-left:3px solid var(--green);}
.card.week{border-left:3px solid var(--blue);margin-bottom:0;}
.card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card.today .card-t{color:var(--accent);}
.card.tmr .card-t{color:var(--green);}
.card.week .card-t{color:var(--blue);}
.card-date{font-weight:400;font-size:11px;opacity:.6;font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none;}

/* EVENTS */
.evl{display:flex;flex-direction:column;gap:5px;}
.ev{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg3);border-radius:6px;}
.ev-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;min-width:42px;text-align:center;}
.ev-tag.ar {background:rgba(63,185,80,.15);color:var(--green);}
.ev-tag.ap {background:rgba(248,81,73,.15);color:var(--red);}
.ev-tag.etd{background:rgba(88,166,255,.15);color:var(--blue);}
.ev-tag.eta{background:rgba(210,153,34,.15);color:var(--yellow);}
.ev-n{flex:1;font-size:13px;}
.ev-a{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);flex-shrink:0;}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:13px;}

/* WEEK GROUPS */
.wk-group{margin-bottom:10px;}
.wk-group:last-child{margin-bottom:0;}
.wk-day-hdr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:5px;padding-left:2px;}

/* BANNER */
.banner{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:16px;line-height:1.6;}
.banner.warn{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);}
.banner.good{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);}
.banner.info{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);color:var(--blue);}

/* TABLE */
.th{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.th-t{font-size:14px;font-weight:600;}
.th-s{font-size:12px;color:var(--text3);margin-top:2px;}
.srch{padding:7px 13px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;width:210px;font-family:inherit;}
.srch:focus{outline:none;border-color:var(--blue);}
.srch::placeholder{color:var(--text3);}
.tw{border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg3);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 13px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.ok  {background:rgba(63,185,80,.15);color:var(--green);}
.pill.warn{background:rgba(210,153,34,.15);color:var(--yellow);}
.pill.err {background:rgba(248,81,73,.15);color:var(--red);}
.pill.pend{background:rgba(88,166,255,.1);color:var(--blue);}

/* ANNO */
.anno-sel{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;}
.anno-sel:hover,.anno-sel:focus{outline:none;border-color:var(--yellow);}

/* TIMELINE */
.tls{margin-bottom:24px;}
.tlh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px;}
.tli{display:flex;align-items:stretch;margin-bottom:5px;}
.tl-dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);width:86px;flex-shrink:0;padding-top:10px;}
.tl-ln{width:2px;background:var(--border);margin:0 14px;flex-shrink:0;position:relative;}
.tl-ln::before{content:'';position:absolute;top:11px;left:-4px;width:10px;height:10px;border-radius:50%;}
.tl-ln.etd::before{background:var(--blue);}
.tl-ln.eta::before{background:var(--yellow);}
.tl-ln.over::before{background:var(--red);}
.tl-b{flex:1;padding:8px 12px;background:var(--bg3);border-radius:6px;}
.tl-n{font-size:13px;}
.tl-m{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* DBG */
.dbg{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:12px;white-space:pre-wrap;max-height:300px;overflow-y:auto;line-height:1.7;}
.dbg-title{font-size:13px;color:var(--text2);margin:12px 0 6px;font-weight:600;}

/* MISC */
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ldg{display:flex;align-items:center;gap:12px;padding:24px;color:var(--text3);font-size:13px;}
@media(max-width:700px){.cg{grid-template-columns:1fr;}.hdr{flex-direction:column;gap:10px;align-items:flex-start;}}
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-pill">📅 今明提醒</div>
  <div class="ticker-area"><div class="ticker-track" id="tickerTrack">
    <span class="ti"><span style="color:var(--text3)">資料載入中...</span></span>
  </div></div>
</div>

<div class="hdr">
  <div><div class="hdr-t">📦 PM 管理中心</div><div class="hdr-d" id="hDate"></div></div>
  <div class="hdr-r"><span class="rtime" id="rtime"></span><button class="btn" onclick="init()">🔄 重新整理</button></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-cal"  onclick="go('cal')">📅 行事曆提醒 <span class="badge zero" id="b-cal">0</span></div>
  <div class="tab"        id="tab-map"  onclick="go('map')">🔍 採購/銷售核對 <span class="badge zero" id="b-map">0</span></div>
  <div class="tab"        id="tab-ship" onclick="go('ship')">🚢 ETD/ETA 追蹤 <span class="badge zero" id="b-ship">0</span></div>
  <div class="tab"        id="tab-dbg"  onclick="go('dbg')">🔧 診斷</div>
</div>

<!-- 行事曆 -->
<div class="pane active" id="pane-cal">
  <div class="cg">
    <div class="card today">
      <div class="card-t">🔴 今日事件 <span class="card-date" id="label-today"></span></div>
      <div class="evl" id="ev-today"><div class="ldg"><div class="spin"></div>載入中...</div></div>
    </div>
    <div class="card tmr">
      <div class="card-t">🟡 明日事件 <span class="card-date" id="label-tmr"></span></div>
      <div class="evl" id="ev-tmr"><div class="ldg"><div class="spin"></div>載入中...</div></div>
    </div>
  </div>
  <div class="card week">
    <div class="card-t">📆 本週事件 <span class="card-date" id="label-week"></span></div>
    <div id="ev-week"><div class="ldg"><div class="spin"></div>載入中...</div></div>
  </div>
</div>

<!-- 採購/銷售核對 -->
<div class="pane" id="pane-map">
  <div id="map-banner" class="banner info">🔄 載入中...</div>
  <div id="map-body"></div>
</div>

<!-- ETD/ETA -->
<div class="pane" id="pane-ship">
  <div id="ship-body"><div class="ldg"><div class="spin"></div>載入中...</div></div>
</div>

<!-- 診斷 -->
<div class="pane" id="pane-dbg">
  <h3 style="margin-bottom:12px;font-size:14px;color:var(--text2)">🔧 連線診斷</h3>
  <div id="dbg-body"><div class="ldg"><div class="spin"></div>診斷中...</div></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// 設定
// ═══════════════════════════════════════════════════
var ID_PURCH  = '1qIHKxU-42qDVT2WDcLZp1Z3Ixg1_VRTURJ96uAVfyhM';
var GID_PURCH = '953244165';
var ID_PAY    = '18BgBt0l9GxmTzWSmeMnTLqD5CE8nobkPPlzZxaD_zLY';
var GID_PAY   = '0';
var ANNO_SHEET_ID = '1RFgUjaR4bzGoZrz355kmQ5__ZUwg7Blf9M2AgYbgyQE';
var ANNO_GID      = '0';

// 欄位
var AP_DATES = ['採購期1預計日','採購期2預計日','採購期3預計日'];
var AP_NAMES = ['採購期1名稱','採購期2名稱','採購期3名稱'];
var AP_AMTS  = ['採購期1金額','採購期2金額','採購期3金額'];
var AP_CURS  = ['採購期1幣別','採購期2幣別','採購期3幣別'];
var AR_DATES = ['銷售期1預計日','銷售期2預計日','銷售期3預計日'];
var AR_NAMES = ['銷售期1名稱','銷售期2名稱','銷售期3名稱'];
var AR_AMTS  = ['銷售期1金額','銷售期2金額','銷售期3金額'];
var AR_CURS  = ['銷售期1幣別','銷售期2幣別','銷售期3幣別'];
var ETD_COL  = 'ETD 出貨日';
var ETA_COL  = 'ETA 到貨日';
var CASE_COL = '案件名稱';
var BIZ_COL  = '業務名稱';
var SUP_COL  = '供應商（賣方）';
var CUS_COL  = '客戶（買方）';
var TYPE_COL = '案件屬性';
var TS_COL   = '時間戳記';

var ANNO_TYPES = {
  'stock':   { label:'📦 庫存出貨', color:'var(--yellow)' },
  'expense': { label:'💼 費用類',   color:'var(--purple)' },
  '':        { label:'— 正常',      color:'var(--text3)'  }
};

// ═══════════════════════════════════════════════════
// 日期工具
// ═══════════════════════════════════════════════════
function getToday() { var d=new Date(); d.setHours(0,0,0,0); return d; }
function getTomorrow() { var d=getToday(); d.setDate(d.getDate()+1); return d; }

function parseDate(v) {
  if (!v) return null;
  var s = String(v).trim();
  if (!s) return null;
  var datePart = s.split(' ')[0].replace(/\//g, '-');
  var parts = datePart.split('-');
  if (parts.length === 3) {
    var yyyy = parts[0].padStart(4,'0');
    var mm   = parts[1].padStart(2,'0');
    var dd   = parts[2].padStart(2,'0');
    var d = new Date(yyyy+'-'+mm+'-'+dd+'T00:00:00');
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}

function sameDay(a,b) {
  if(!a||!b) return false;
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function fmt(d) {
  if(!d) return '-';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fmtAmt(v, cur) {
  var n = parseFloat(String(v||'').replace(/,/g,'').replace(/[^0-9.-]/g,''));
  if (isNaN(n)||n===0) return '';
  return (cur ? cur+' ' : '') + n.toLocaleString('en-US');
}

function getWeekRange(base) {
  var d = new Date(base);
  var day = d.getDay();
  var mon = new Date(d);
  mon.setDate(d.getDate() - (day===0 ? 6 : day-1));
  mon.setHours(0,0,0,0);
  var sun = new Date(mon);
  sun.setDate(mon.getDate()+6);
  sun.setHours(23,59,59,999);
  return { mon: mon, sun: sun };
}

function inWeek(d, mon, sun) { return d >= mon && d <= sun; }

// ═══════════════════════════════════════════════════
// CSV 讀取
// ═══════════════════════════════════════════════════
function fetchCSV(id, gid, skipRows) {
  if (skipRows === undefined) skipRows = 0;
  return new Promise(function(resolve, reject) {
    var url = 'https://docs.google.com/spreadsheets/d/'+id+'/export?format=csv&gid='+gid+'&t='+Date.now();
    Papa.parse(url, {
      download: true,
      header: false,
      skipEmptyLines: true,
      complete: function(result) {
        var all = result.data;
        if (!all.length) { resolve({fields:[], rows:[]}); return; }
        var headers = all[skipRows] || [];
        var rows = all.slice(skipRows+1).map(function(row) {
          var obj = {};
          headers.forEach(function(h,i){ obj[h] = row[i] !== undefined ? row[i] : ''; });
          return obj;
        });
        resolve({ fields: headers, rows: rows });
      },
      error: function(e) { reject(e); }
    });
  });
}

// 標記資料讀取
function fetchAnnotations() {
  return new Promise(function(resolve) {
    var url = 'https://docs.google.com/spreadsheets/d/'+ANNO_SHEET_ID+'/export?format=csv&gid='+ANNO_GID+'&t='+Date.now();
    fetch(url).then(function(res){ return res.text(); }).then(function(txt) {
      var map = {};
      txt.split('\n').forEach(function(line, i) {
        if (i===0) return;
        var cols = line.split(',');
        var key  = (cols[0]||'').replace(/"/g,'').trim();
        var type = (cols[1]||'').replace(/"/g,'').trim();
        var note = (cols[2]||'').replace(/"/g,'').trim();
        if (key) map[key] = { type: type, note: note };
      });
      resolve(map);
    }).catch(function(){ resolve({}); });
  });
}

// ═══════════════════════════════════════════════════
// Tab 切換
// ═══════════════════════════════════════════════════
function go(n) {
  ['cal','map','ship','dbg'].forEach(function(x) {
    var tab = document.getElementById('tab-'+x);
    var pane = document.getElementById('pane-'+x);
    if(tab)  tab.classList.toggle('active', x===n);
    if(pane) pane.classList.toggle('active', x===n);
  });
}

// ═══════════════════════════════════════════════════
// Event HTML
// ═══════════════════════════════════════════════════
function evHTML(tag, name, amt) {
  var LABELS = {AP:'應付', AR:'應收', ETD:'ETD', ETA:'ETA'};
  var label = LABELS[tag] || tag;
  return '<div class="ev">'
    + '<span class="ev-tag '+tag.toLowerCase()+'">'+label+'</span>'
    + '<span class="ev-n">'+(name||'(未命名)')+'</span>'
    + (amt ? '<span class="ev-a">'+amt+'</span>' : '')
    + '</div>';
}

// ═══════════════════════════════════════════════════
// 標記功能
// ═══════════════════════════════════════════════════
function rowKey(r) {
  return (r[CASE_COL]||'')+'|'+(r[BIZ_COL]||'')+'|'+(r[SUP_COL]||'');
}

function setAnnotation(key, type, caseName) {
  var sa;
  try { sa = JSON.parse(sessionStorage.getItem('pm_anno')||'{}'); } catch(e) { sa={}; }
  if (type) { sa[key] = { type: type, note: '' }; }
  else { delete sa[key]; }
  try { sessionStorage.setItem('pm_anno', JSON.stringify(sa)); } catch(e) {}
  showAnnoPanel(key, type, caseName);
  init();
}

function showAnnoPanel(key, type, caseName) {
  var panel = document.getElementById('anno-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'anno-panel';
    panel.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;font-size:13px;z-index:999;width:400px;box-shadow:0 8px 32px rgba(0,0,0,.5)';
    document.body.appendChild(panel);
  }
  var typeInfo = ANNO_TYPES[type||''] || ANNO_TYPES[''];
  var sheetURL = 'https://docs.google.com/spreadsheets/d/'+ANNO_SHEET_ID+'/edit';
  var timeStr  = new Date().toLocaleString('zh-TW');
  var rowText  = key + '\t' + (type||'') + '\t\t' + timeStr;
  var title    = type ? (typeInfo.label+' 已標記') : '已取消標記';

  panel.innerHTML = '';

  var hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
  var titleSpan = document.createElement('span');
  titleSpan.style.cssText = 'font-weight:700;color:var(--text)';
  titleSpan.textContent = title;
  var closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer';
  closeBtn.onclick = function(){ panel.style.display='none'; };
  hdr.appendChild(titleSpan); hdr.appendChild(closeBtn);
  panel.appendChild(hdr);

  var caseDiv = document.createElement('div');
  caseDiv.style.cssText = 'color:var(--text2);margin-bottom:10px;font-size:12px';
  caseDiv.innerHTML = '案件：<strong style="color:var(--text)">'+caseName+'</strong>';
  panel.appendChild(caseDiv);

  var box = document.createElement('div');
  box.style.cssText = 'background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:12px';
  var hint = document.createElement('div');
  hint.style.cssText = 'color:var(--text3);font-size:11px;margin-bottom:6px';
  hint.textContent = '📋 請複製以下資料，貼到 Google Sheet 新列（A欄開始）：';
  box.appendChild(hint);
  var code = document.createElement('code');
  code.style.cssText = "font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);word-break:break-all;display:block";
  code.textContent = rowText;
  box.appendChild(code);
  var copyBtn = document.createElement('button');
  copyBtn.className = 'btn';
  copyBtn.style.cssText = 'margin-top:8px;font-size:12px;padding:4px 12px';
  copyBtn.textContent = '📋 複製';
  copyBtn.onclick = function() {
    navigator.clipboard.writeText(rowText);
    copyBtn.textContent = '✅ 已複製!';
    setTimeout(function(){ copyBtn.textContent = '📋 複製'; }, 1500);
  };
  box.appendChild(copyBtn);
  panel.appendChild(box);

  var link = document.createElement('a');
  link.href = sheetURL; link.target = '_blank';
  link.style.cssText = 'display:block;text-align:center;padding:8px;border-radius:8px;background:var(--blue);color:#000;font-weight:700;font-size:13px;text-decoration:none';
  link.textContent = '📂 開啟 Google Sheet 貼入';
  panel.appendChild(link);

  var note = document.createElement('div');
  note.style.cssText = 'color:var(--text3);font-size:11px;margin-top:8px;text-align:center';
  note.textContent = '格式：案件Key | 類型(stock/expense) | 備註 | 時間';
  panel.appendChild(note);

  panel.style.display = 'block';
}

// ═══════════════════════════════════════════════════
// 採購/銷售判斷
// ═══════════════════════════════════════════════════
function hasPurch(r) {
  return AP_DATES.some(function(c){ return r[c] && r[c].trim(); }) ||
    ['採購期1金額','採購期2金額','採購期3金額'].some(function(c){
      var v = r[c]; return v && parseFloat(String(v).replace(/,/g,'')) > 0;
    });
}

function hasSale(r) {
  return AR_DATES.some(function(c){ return r[c] && r[c].trim(); }) ||
    ['銷售期1金額','銷售期2金額','銷售期3金額'].some(function(c){
      var v = r[c]; return v && parseFloat(String(v).replace(/,/g,'')) > 0;
    }) ||
    ['銷售期1名稱','銷售期2名稱','銷售期3名稱'].some(function(c){ return r[c] && r[c].trim(); });
}

// 搜尋
function ftbl(q, id) {
  document.querySelectorAll('#'+id+' tbody tr').forEach(function(r){
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ═══════════════════════════════════════════════════
// 主邏輯
// ═══════════════════════════════════════════════════
async function init() {
  var T  = getToday();
  var TM = getTomorrow();
  var wk = getWeekRange(T);
  var WK_MON = wk.mon, WK_SUN = wk.sun;
  var DAYS = ['日','一','二','三','四','五','六'];

  document.getElementById('hDate').textContent = fmt(T) + ' （今日）';
  document.getElementById('label-today').textContent = fmt(T);
  document.getElementById('label-tmr').textContent   = fmt(TM);
  document.getElementById('label-week').textContent  = fmt(WK_MON) + ' ～ ' + fmt(WK_SUN);
  document.getElementById('rtime').textContent = '更新中...';

  var dbg = [];

  // 讀取採購表
  var purchRows=[], purchFields=[];
  try {
    dbg.push('[採購表] 讀取中...');
    var pr = await fetchCSV(ID_PURCH, GID_PURCH, 0);
    purchFields = pr.fields; purchRows = pr.rows;
    dbg.push('[採購表] ✅ '+purchRows.length+'列');
    dbg.push('欄位前6：'+purchFields.slice(0,6).join(' | '));
  } catch(e) { dbg.push('[採購表] ❌ '+e); }

  // 讀取收款表
  var payRows=[], payFields=[];
  try {
    dbg.push('[收款表] 讀取中...');
    var pr2 = await fetchCSV(ID_PAY, GID_PAY, 2);
    payFields = pr2.fields; payRows = pr2.rows;
    dbg.push('[收款表] ✅ '+payRows.length+'列  欄位：'+payFields.slice(0,6).join(' | '));
  } catch(e) { dbg.push('[收款表] ❌ '+e); }

  // 讀取標記資料
  var sheetAnno = await fetchAnnotations();
  var sessionAnno;
  try { sessionAnno = JSON.parse(sessionStorage.getItem('pm_anno')||'{}'); } catch(e){ sessionAnno={}; }
  var annoMap = Object.assign({}, sheetAnno, sessionAnno);

  // 診斷
  document.getElementById('dbg-body').innerHTML =
    '<div class="dbg">'+dbg.join('\n')+'</div>'
    +'<div class="dbg-title">採購表欄位：</div>'
    +'<div class="dbg">'+(purchFields.join('\n')||'(無)')+'</div>'
    +'<div class="dbg-title">採購表第1筆：</div>'
    +'<div class="dbg">'+JSON.stringify(purchRows[0]||{},null,2)+'</div>'
    +'<div class="dbg-title">收款表欄位：</div>'
    +'<div class="dbg">'+(payFields.join('\n')||'(無)')+'</div>';

  var validRows = purchRows.filter(function(r){ return r[CASE_COL] && r[CASE_COL].trim(); });

  // ── 收集事件 ──────────────────────────────────────
  var todayEvs=[], tmrEvs=[], weekEvs=[], tickEvs=[];

  validRows.forEach(function(r) {
    var cn = r[CASE_COL] || '(未命名)';

    // AP
    AP_DATES.forEach(function(dc,i) {
      var d = parseDate(r[dc]); if(!d) return;
      var amt = fmtAmt(r[AP_AMTS[i]], r[AP_CURS[i]]);
      var label = cn + '｜' + (r[AP_NAMES[i]]||'採購款');
      if (sameDay(d,T))  { todayEvs.push({tag:'AP',name:label,amt:amt}); tickEvs.push({tag:'AP',name:cn,amt:amt,day:'today'}); }
      if (sameDay(d,TM)) { tmrEvs.push({tag:'AP',name:label,amt:amt});   tickEvs.push({tag:'AP',name:cn,amt:amt,day:'tmr'}); }
      if (inWeek(d,WK_MON,WK_SUN) && !sameDay(d,T) && !sameDay(d,TM))
        weekEvs.push({tag:'AP',name:label,amt:amt,date:d});
    });

    // AR
    AR_DATES.forEach(function(dc,i) {
      var d = parseDate(r[dc]); if(!d) return;
      var amt = fmtAmt(r[AR_AMTS[i]], r[AR_CURS[i]]);
      var label = cn + '｜' + (r[AR_NAMES[i]]||'銷售款');
      if (sameDay(d,T))  { todayEvs.push({tag:'AR',name:label,amt:amt}); tickEvs.push({tag:'AR',name:cn,amt:amt,day:'today'}); }
      if (sameDay(d,TM)) { tmrEvs.push({tag:'AR',name:label,amt:amt});   tickEvs.push({tag:'AR',name:cn,amt:amt,day:'tmr'}); }
      if (inWeek(d,WK_MON,WK_SUN) && !sameDay(d,T) && !sameDay(d,TM))
        weekEvs.push({tag:'AR',name:label,amt:amt,date:d});
    });

    // ETD
    var etd = parseDate(r[ETD_COL]);
    if (etd) {
      if (sameDay(etd,T))  { todayEvs.push({tag:'ETD',name:cn,amt:''}); tickEvs.push({tag:'ETD',name:cn,amt:'',day:'today'}); }
      if (sameDay(etd,TM)) { tmrEvs.push({tag:'ETD',name:cn,amt:''});   tickEvs.push({tag:'ETD',name:cn,amt:'',day:'tmr'}); }
      if (inWeek(etd,WK_MON,WK_SUN) && !sameDay(etd,T) && !sameDay(etd,TM))
        weekEvs.push({tag:'ETD',name:cn,amt:'',date:etd});
    }

    // ETA
    var eta = parseDate(r[ETA_COL]);
    if (eta) {
      if (sameDay(eta,T))  { todayEvs.push({tag:'ETA',name:cn,amt:''}); tickEvs.push({tag:'ETA',name:cn,amt:'',day:'today'}); }
      if (sameDay(eta,TM)) { tmrEvs.push({tag:'ETA',name:cn,amt:''});   tickEvs.push({tag:'ETA',name:cn,amt:'',day:'tmr'}); }
      if (inWeek(eta,WK_MON,WK_SUN) && !sameDay(eta,T) && !sameDay(eta,TM))
        weekEvs.push({tag:'ETA',name:cn,amt:'',date:eta});
    }
  });

  // 收款表補充
  var PAY_DATE = payFields.find(function(f){ return f.includes('收款日')||f.includes('付款日'); });
  var PAY_NOTE = payFields.find(function(f){ return f==='備註'; }) || payFields[4];
  var PAY_CURS = ['NTD','USD','JPY','EUR','ZAR'];
  if (PAY_DATE) {
    payRows.filter(function(r){ return r[PAY_NOTE] && r[PAY_NOTE].trim(); }).forEach(function(r) {
      var d = parseDate(r[PAY_DATE]); if(!d) return;
      var name = r[PAY_NOTE] || '(收款)';
      var amtParts = PAY_CURS.map(function(c){
        var v = r[c]; if(!v) return '';
        var n = parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.-]/g,''));
        return (isNaN(n)||n===0) ? '' : c+' '+n.toLocaleString('en-US');
      }).filter(Boolean);
      var amt = amtParts.join(' / ');
      var tag = (r['狀態']||'').includes('付') ? 'AP' : 'AR';
      if (sameDay(d,T))  { todayEvs.push({tag:tag,name:name,amt:amt}); tickEvs.push({tag:tag,name:name,amt:amt,day:'today'}); }
      if (sameDay(d,TM)) { tmrEvs.push({tag:tag,name:name,amt:amt});   tickEvs.push({tag:tag,name:name,amt:amt,day:'tmr'}); }
      if (inWeek(d,WK_MON,WK_SUN) && !sameDay(d,T) && !sameDay(d,TM))
        weekEvs.push({tag:tag,name:name,amt:amt,date:d});
    });
  }

  // ── 行事曆渲染 ────────────────────────────────────
  var calTotal = todayEvs.length + tmrEvs.length;
  var bCal = document.getElementById('b-cal');
  bCal.textContent = calTotal;
  bCal.className = 'badge ' + (calTotal > 0 ? 'hot' : 'zero');

  document.getElementById('ev-today').innerHTML = todayEvs.length
    ? todayEvs.map(function(e){ return evHTML(e.tag,e.name,e.amt); }).join('')
    : '<div class="empty">✅ 今日無待辦事件</div>';

  document.getElementById('ev-tmr').innerHTML = tmrEvs.length
    ? tmrEvs.map(function(e){ return evHTML(e.tag,e.name,e.amt); }).join('')
    : '<div class="empty">✅ 明日無待辦事件</div>';

  // 本週渲染（依日期分組）
  weekEvs.sort(function(a,b){ return a.date - b.date; });
  if (!weekEvs.length) {
    document.getElementById('ev-week').innerHTML = '<div class="empty">✅ 本週（今明除外）無其他事件</div>';
  } else {
    var groups = {};
    weekEvs.forEach(function(e) {
      var dk = fmt(e.date);
      if (!groups[dk]) groups[dk] = { date: e.date, evs: [] };
      groups[dk].evs.push(e);
    });
    var wkHTML = Object.values(groups).map(function(g) {
      var dow = DAYS[g.date.getDay()];
      return '<div class="wk-group">'
        + '<div class="wk-day-hdr">'+fmt(g.date)+' ('+dow+')</div>'
        + '<div class="evl">'+g.evs.map(function(e){ return evHTML(e.tag,e.name,e.amt); }).join('')+'</div>'
        + '</div>';
    }).join('');
    document.getElementById('ev-week').innerHTML = wkHTML;
  }

  // 跑馬燈
  var TICK_LABELS = {AP:'應付',AR:'應收',ETD:'ETD',ETA:'ETA'};
  if (!tickEvs.length) {
    document.getElementById('tickerTrack').innerHTML = '<span class="ti" style="color:var(--text3)">✅ 今明兩日無待辦事件</span>';
  } else {
    var tiHTML = tickEvs.concat(tickEvs).map(function(e) {
      return '<span class="ti">'
        + '<span class="'+(e.day==='today'?'ti-today':'ti-tmr')+'">'+(e.day==='today'?'今日':'明日')+'</span>'
        + '<span class="ti-tag '+e.tag.toLowerCase()+'">'+(TICK_LABELS[e.tag]||e.tag)+'</span>'
        + '<span>'+e.name+'</span>'
        + (e.amt ? '<span style="color:var(--text3);font-size:11px">'+e.amt+'</span>' : '')
        + '</span>';
    }).join('');
    document.getElementById('tickerTrack').innerHTML = tiHTML;
  }

  // ── 採購/銷售核對 ─────────────────────────────────
  var unmapped = validRows.filter(function(r) {
    var hp = hasPurch(r), hs = hasSale(r);
    var tp = r[TYPE_COL] || '';
    return hp && !hs && (tp.includes('採購')||tp.includes('三角'));
  });

  var sessionAnnoKeys = Object.keys(sessionAnno);
  var realUnmapped = unmapped.filter(function(r){ return !annoMap[rowKey(r)]; });
  var annotated    = validRows.filter(function(r){ return !!annoMap[rowKey(r)]; });

  var bMap = document.getElementById('b-map');
  bMap.textContent = realUnmapped.length;
  bMap.className = 'badge ' + (realUnmapped.length > 0 ? 'hot' : 'ok');

  var mb = document.getElementById('map-banner');
  mb.className = 'banner ' + (realUnmapped.length > 0 ? 'warn' : 'good');
  mb.innerHTML = realUnmapped.length > 0
    ? '🔴 發現 <strong>'+realUnmapped.length+'</strong> 筆採購未對應到銷售'
    : '✅ 所有採購均已對應到銷售';

  var DISP = [CASE_COL, BIZ_COL, SUP_COL, CUS_COL, TYPE_COL];

  function selHTML(key, cn, curType) {
    var opts = [
      {v:'stock',   l:'📦 庫存出貨'},
      {v:'expense', l:'💼 費用類'},
      {v:'',        l:'✕ 取消標記'}
    ].map(function(o){
      return '<option value="'+o.v+'" '+(o.v===curType?'selected':'')+'>'+o.l+'</option>';
    }).join('');
    var esc = key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var ecn = cn.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<select class="anno-sel" onchange="setAnnotation(\''+esc+'\',this.value,\''+ecn+'\')">'+opts+'</select>';
  }

  var mapHTML = '';

  if (realUnmapped.length) {
    mapHTML += '<div class="th"><div><div class="th-t">🔴 採購未對應銷售（'+realUnmapped.length+'筆）</div>'
      +'<div class="th-s">若為庫存出或費用類，請在右側選擇標記</div></div></div>'
      +'<div class="tw"><table><thead><tr>'
      +DISP.map(function(c){ return '<th>'+c+'</th>'; }).join('')
      +'<th>採購期1日</th><th>狀態</th><th>標記</th>'
      +'</tr></thead><tbody>'
      +realUnmapped.map(function(r) {
        var key = rowKey(r), cn = r[CASE_COL]||'';
        return '<tr>'
          +DISP.map(function(c){ return '<td>'+(r[c]||'-')+'</td>'; }).join('')
          +'<td style="font-family:\'JetBrains Mono\',monospace">'+fmt(parseDate(r['採購期1預計日']))+'</td>'
          +'<td><span class="pill warn">⚠️ 未對應</span></td>'
          +'<td><select class="anno-sel" onchange="setAnnotation(\''+key.replace(/'/g,"\\'")+'\',this.value,\''+cn.replace(/'/g,"\\'")+'\')"><option value="">— 選擇標記</option><option value="stock">📦 庫存出貨</option><option value="expense">💼 費用類</option></select></td>'
          +'</tr>';
      }).join('')
      +'</tbody></table></div>';
  }

  if (annotated.length) {
    mapHTML += '<div class="th" style="margin-top:8px"><div><div class="th-t" style="color:var(--text2)">🏷️ 已標記案件（'+annotated.length+'筆）</div></div></div>'
      +'<div class="tw"><table><thead><tr>'
      +DISP.map(function(c){ return '<th>'+c+'</th>'; }).join('')
      +'<th>標記類型</th><th>修改</th>'
      +'</tr></thead><tbody>'
      +annotated.map(function(r) {
        var key = rowKey(r), cn = r[CASE_COL]||'';
        var anno = annoMap[key] || {};
        var ti = ANNO_TYPES[anno.type||''] || ANNO_TYPES[''];
        return '<tr>'
          +DISP.map(function(c){ return '<td>'+(r[c]||'-')+'</td>'; }).join('')
          +'<td><span class="pill pend" style="color:'+ti.color+'">'+ti.label+'</span></td>'
          +'<td><select class="anno-sel" onchange="setAnnotation(\''+key.replace(/'/g,"\\'")+'\',this.value,\''+cn.replace(/'/g,"\\'")+'\')"><option value="stock" '+(anno.type==='stock'?'selected':'')+'>📦 庫存出貨</option><option value="expense" '+(anno.type==='expense'?'selected':'')+'>💼 費用類</option><option value="">✕ 取消標記</option></select></td>'
          +'</tr>';
      }).join('')
      +'</tbody></table></div>';
  }

  mapHTML += '<div class="th" style="margin-top:8px"><div><div class="th-t">📋 全部案件（'+validRows.length+'筆）</div></div>'
    +'<input class="srch" placeholder="搜尋案件/客戶/供應商..." oninput="ftbl(this.value,\'ftable\')">'
    +'</div>'
    +'<div class="tw"><table id="ftable"><thead><tr>'
    +DISP.map(function(c){ return '<th>'+c+'</th>'; }).join('')
    +'<th>採購</th><th>銷售</th><th>ETD</th><th>ETA</th>'
    +'</tr></thead><tbody>'
    +validRows.map(function(r) {
      var hp = hasPurch(r), hs = hasSale(r);
      var anno = annoMap[rowKey(r)];
      var etd = parseDate(r[ETD_COL]), eta = parseDate(r[ETA_COL]);
      var st;
      if (anno) {
        var ti = ANNO_TYPES[anno.type||''] || ANNO_TYPES[''];
        st = '<span class="pill pend" style="color:'+ti.color+'">'+ti.label+'</span>';
      } else if (hp&&hs) { st = '<span class="pill ok">✅ 完整</span>'; }
      else if (hp&&!hs)  { st = '<span class="pill warn">⚠️ 無銷售</span>'; }
      else if (!hp&&hs)  { st = '<span class="pill err">❌ 無採購</span>'; }
      else               { st = '<span class="pill pend">待確認</span>'; }
      return '<tr>'
        +DISP.map(function(c){ return '<td>'+(r[c]||'-')+'</td>'; }).join('')
        +'<td><span class="pill '+(hp?'ok':'pend')+'">'+(hp?'✅':'—')+'</span></td>'
        +'<td>'+st+'</td>'
        +'<td style="font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(etd?fmt(etd):'-')+'</td>'
        +'<td style="font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(eta?fmt(eta):'-')+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table></div>';

  document.getElementById('map-body').innerHTML = mapHTML;

  // ── ETD/ETA 追蹤 ──────────────────────────────────
  var ships = [];
  validRows.forEach(function(r) {
    var name = r[CASE_COL]||'(未命名)', sup = r[SUP_COL]||'', cust = r[CUS_COL]||'';
    var etd = parseDate(r[ETD_COL]); if(etd) ships.push({type:'ETD',date:etd,name:name,sup:sup,cust:cust});
    var eta = parseDate(r[ETA_COL]); if(eta) ships.push({type:'ETA',date:eta,name:name,sup:sup,cust:cust});
  });
  ships.sort(function(a,b){ return a.date-b.date; });

  var now = getToday();
  var overdue  = ships.filter(function(e){ return e.date<now; });
  var upcoming = ships.filter(function(e){ return e.date>=now; });
  var todayS   = ships.filter(function(e){ return sameDay(e.date,T); });
  var tmrS     = ships.filter(function(e){ return sameDay(e.date,TM); });

  var bShip = document.getElementById('b-ship');
  bShip.textContent = todayS.length+tmrS.length;
  bShip.className = 'badge '+((todayS.length+tmrS.length)>0?'hot':'zero');

  function tlHTML(evts) {
    return evts.map(function(e) {
      var cls = e.date<now ? 'over' : e.type.toLowerCase();
      return '<div class="tli">'
        +'<div class="tl-dt">'+fmt(e.date)+'</div>'
        +'<div class="tl-ln '+cls+'"></div>'
        +'<div class="tl-b"><div class="tl-n">'+e.name+'</div>'
        +'<div class="tl-m">['+e.type+']'+(e.sup?' 供應商: '+e.sup:'')+(e.cust?' ｜ 客戶: '+e.cust:'')+'</div></div>'
        +'</div>';
    }).join('');
  }

  var upETD = upcoming.filter(function(e){ return e.type==='ETD'; });
  var upETA = upcoming.filter(function(e){ return e.type==='ETA'; });

  var shipHTML = '<div class="cg" style="margin-bottom:20px">'
    +'<div class="card today"><div class="card-t">🚢 今日出入貨</div><div class="evl">'
    +(todayS.length ? todayS.map(function(e){ return evHTML(e.type,e.name,''); }).join('') : '<div class="empty">✅ 今日無出入貨</div>')
    +'</div></div>'
    +'<div class="card tmr"><div class="card-t">🚢 明日出入貨</div><div class="evl">'
    +(tmrS.length ? tmrS.map(function(e){ return evHTML(e.type,e.name,''); }).join('') : '<div class="empty">✅ 明日無出入貨</div>')
    +'</div></div></div>';

  if (overdue.length) {
    shipHTML += '<div class="tls"><div class="tlh" style="color:var(--red)">⚠️ 逾期（'+overdue.length+'筆）</div>'+tlHTML(overdue)+'</div>';
  }
  shipHTML += '<div class="tls"><div class="tlh" style="color:var(--blue)">📤 即將出貨 ETD（'+upETD.length+'筆）</div>'+(upETD.length?tlHTML(upETD):'<div class="empty">暫無</div>')+'</div>';
  shipHTML += '<div class="tls"><div class="tlh" style="color:var(--yellow)">📥 即將到貨 ETA（'+upETA.length+'筆）</div>'+(upETA.length?tlHTML(upETA):'<div class="empty">暫無</div>')+'</div>';
  document.getElementById('ship-body').innerHTML = shipHTML;

  var n = new Date();
  document.getElementById('rtime').textContent = '最後更新 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

init();
setInterval(init, 5*60*1000);
</script>
</body>
</html>
