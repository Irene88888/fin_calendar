*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

.ti-today{color:var(--accent);font-size:10px;}
.ti-tmr{color:var(--green);font-size:10px;}

.hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.hdr-t{font-size:18px;font-weight:700;}
.hdr-d{color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{border-color:var(--blue);}
.rtime{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace;}

.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}

.tab:hover{color:var(--text);}

.badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;min-width:18px;text-align:center;}
.badge.hot{background:var(--red);color:#fff;}

.pane{display:none;padding:20px 24px;}
.pane.active{display:block;}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}

@media(max-width:700px){.cg{grid-template-columns:1fr;}.hdr{flex-direction:column;gap:10px;align-items:flex-start;}}

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

const ID_PURCH  = '1qIHKxU-42qDVT2WDcLZp1Z3Ixg1_VRTURJ96uAVfyhM';
const GID_PURCH = '953244165';

// ж”¶ж¬ҫзөұиЁҲиЎЁпјҲйғЁй–ҖгҖҒзӢҖж…ӢгҖҒж”¶ж¬ҫж—ҘгҖҒNTDгҖҒUSD...пјү
const ID_PAY    = '18BgBt0l9GxmTzWSmeMnTLqD5CE8nobkPPlzZxaD_zLY';
const GID_PAY   = '0';

// зі»зөұж ёе°ҚиЎЁ
const ID_SYS    = '1g6fdEEKRnBJ0hxUZaxb9RDZFmIALXTzkmsWVqp3LTF4';
const GID_SYS   = '0';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// жҺЎиіј/йҠ·е”®иЎЁж¬„дҪҚпјҲе·ІзўәиӘҚпјү
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const AP_DATES = ['жҺЎиіјжңҹ1й җиЁҲж—Ҙ','жҺЎиіјжңҹ2й җиЁҲж—Ҙ','жҺЎиіјжңҹ3й җиЁҲж—Ҙ'];
const AP_NAMES = ['жҺЎиіјжңҹ1еҗҚзЁұ','жҺЎиіјжңҹ2еҗҚзЁұ','жҺЎиіјжңҹ3еҗҚзЁұ'];
const AP_AMTS  = ['жҺЎиіјжңҹ1йҮ‘йЎҚ','жҺЎиіјжңҹ2йҮ‘йЎҚ','жҺЎиіјжңҹ3йҮ‘йЎҚ'];
const AP_CURS  = ['жҺЎиіјжңҹ1е№ЈеҲҘ','жҺЎиіјжңҹ2е№ЈеҲҘ','жҺЎиіјжңҹ3е№ЈеҲҘ'];
const AR_DATES = ['йҠ·е”®жңҹ1й җиЁҲж—Ҙ','йҠ·е”®жңҹ2й җиЁҲж—Ҙ','йҠ·е”®жңҹ3й җиЁҲж—Ҙ'];
const AR_NAMES = ['йҠ·е”®жңҹ1еҗҚзЁұ','йҠ·е”®жңҹ2еҗҚзЁұ','йҠ·е”®жңҹ3еҗҚзЁұ'];
const AR_AMTS  = ['йҠ·е”®жңҹ1йҮ‘йЎҚ','йҠ·е”®жңҹ2йҮ‘йЎҚ','йҠ·е”®жңҹ3йҮ‘йЎҚ'];
const AR_CURS  = ['йҠ·е”®жңҹ1е№ЈеҲҘ','йҠ·е”®жңҹ2е№ЈеҲҘ','йҠ·е”®жңҹ3е№ЈеҲҘ'];
const ETD_COL  = 'ETD еҮәиІЁж—Ҙ';
const ETA_COL  = 'ETA еҲ°иІЁж—Ҙ';
const CASE_COL = 'жЎҲд»¶еҗҚзЁұ';
const BIZ_COL  = 'жҘӯеӢҷеҗҚзЁұ';
const SUP_COL  = 'дҫӣжҮүе•ҶпјҲиіЈж–№пјү';
const CUS_COL  = 'е®ўжҲ¶пјҲиІ·ж–№пјү';
const TYPE_COL = 'жЎҲд»¶еұ¬жҖ§';
const TS_COL   = 'жҷӮй–“жҲіиЁҳ';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ж—Ҙжңҹе·Ҙе…·
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const getToday    = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const getTomorrow = () => { const d=getToday(); d.setDate(d.getDate()+1); return d; };

function parseDate(v) {
  if (!v && v!==0) return null;
  const s = String(v).trim();
  if (!s || s==='0') return null;
  // еҸ–ж—ҘжңҹйғЁеҲҶпјҢеҺ»жҺүжҷӮй–“пјҲ"2026/4/10 дёӢеҚҲ 1:40:36" вҶ’ "2026/4/10"пјү
  const datePart = s.split(' ')[0].replace(/\//g, '-');
  const d = new Date(datePart);
  return isNaN(d.getTime()) ? null : d;
}

function sameDay(a,b){
  if(!a||!b) return false;
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
const fmt = d => d
  ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
  : '-';
const fmtAmt = (v,cur) => {
  const n=parseFloat(String(v||'').replace(/[^0-9.-]/g,''));
  return (isNaN(n)||n===0)?'':`${n.toLocaleString()}${cur?' '+cur:''}`;
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CSV и®ҖеҸ–
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function fetchCSV(id, gid, skipRows=0) {
  return new Promise((resolve, reject) => {
    const url = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}&t=${Date.now()}`;
    Papa.parse(url, {
      download: true,
      header: false,
      skipEmptyLines: true,
      complete: result => {
        const all = result.data;
        if (!all.length) { resolve({fields:[],rows:[]}); return; }
        const headers = all[skipRows] || [];
        const rows = all.slice(skipRows+1).map(row => {
          const obj={};
          headers.forEach((h,i) => { obj[h] = row[i]!==undefined ? row[i] : ''; });
          return obj;
        });
        resolve({fields:headers, rows});
      },
      error: e => reject(e),
    });
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// Tab еҲҮжҸӣ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function go(n){
  ['cal','map','ship','dbg'].forEach(x=>{
    document.getElementById('tab-'+x)?.classList.toggle('active',x===n);
    document.getElementById('pane-'+x)?.classList.toggle('active',x===n);
  });
}

const evHTML = (tag,name,amt) =>
  `<div class="ev"><span class="ev-tag ${tag.toLowerCase()}">${tag}</span><span class="ev-n">${name||'(жңӘе‘ҪеҗҚ)'}</span>${amt?`<span class="ev-a">${amt}</span>`:''}</div>`;

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// дё»йӮҸијҜ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function init(){
  const T=getToday(), TM=getTomorrow();
  document.getElementById('hDate').textContent = fmt(T)+' пјҲд»Ҡж—Ҙпјү';
  document.getElementById('rtime').textContent = 'жӣҙж–°дёӯ...';

  const dbg=[];

  // в”Җв”Җ и®ҖеҸ–жҺЎиіј/йҠ·е”®иЎЁпјҲGID=953244165пјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let purchRows=[], purchFields=[];
  try {
    dbg.push(`[жҺЎиіјиЎЁ] ID=${ID_PURCH} GID=${GID_PURCH}`);
    const r = await fetchCSV(ID_PURCH, GID_PURCH, 0);
    purchFields = r.fields;
    purchRows   = r.rows;
    dbg.push(`вң… и®ҖеҸ–жҲҗеҠҹпјҡ${purchRows.length} еҲ—`);
    dbg.push(`еүҚ6ж¬„пјҡ${purchFields.slice(0,6).join(' | ')}`);
    dbg.push(`еҗ«жЎҲд»¶еҗҚзЁұж¬„пјҡ${purchFields.includes(CASE_COL)}`);
    dbg.push(`еҗ«жҷӮй–“жҲіиЁҳж¬„пјҡ${purchFields.includes(TS_COL)}`);
  } catch(e) {
    dbg.push(`вқҢ еӨұж•—пјҡ${e.message||e}`);
  }

  // в”Җв”Җ и®ҖеҸ–ж”¶ж¬ҫзөұиЁҲиЎЁпјҲskip 2 rowsпјҡжЁҷйЎҢеҲ— + еҗҲиЁҲеҲ—пјүв”Җв”Җ
  let payRows=[], payFields=[];
  try {
    dbg.push(`\n[ж”¶ж¬ҫиЎЁ] ID=${ID_PAY} GID=${GID_PAY}`);
    const r = await fetchCSV(ID_PAY, GID_PAY, 2);
    payFields = r.fields;
    payRows   = r.rows;
    dbg.push(`вң… и®ҖеҸ–жҲҗеҠҹпјҡ${payRows.length} еҲ—`);
    dbg.push(`еүҚ6ж¬„пјҡ${payFields.slice(0,6).join(' | ')}`);
  } catch(e) {
    dbg.push(`вқҢ еӨұж•—пјҡ${e.message||e}`);
  }

  // в”Җв”Җ жӣҙж–°иЁәж–·й Ғ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  document.getElementById('dbg-body').innerHTML = `
    <div class="dbg">${dbg.join('\n')}</div>
    <div class="dbg-title">рҹ“Ӣ жҺЎиіјиЎЁе…ЁйғЁж¬„дҪҚпјҡ</div>
    <div class="dbg">${purchFields.join('\n')||'(з„Ў)'}</div>
    <div class="dbg-title">рҹ“Ӣ жҺЎиіјиЎЁз¬¬дёҖзӯҶиіҮж–ҷпјҡ</div>
    <div class="dbg">${JSON.stringify(purchRows[0]||{},null,2)}</div>
    <div class="dbg-title">рҹ’° ж”¶ж¬ҫиЎЁе…ЁйғЁж¬„дҪҚпјҡ</div>
    <div class="dbg">${payFields.join('\n')||'(з„Ў)'}</div>
    <div class="dbg-title">рҹ’° ж”¶ж¬ҫиЎЁз¬¬дёҖзӯҶиіҮж–ҷпјҡ</div>
    <div class="dbg">${JSON.stringify(payRows[0]||{},null,2)}</div>`;

  // йҒҺжҝҫжңүж•ҲеҲ—
  const validRows = purchRows.filter(r => r[CASE_COL]?.trim() || r[TS_COL]?.trim());
  dbg.push(`\nжңүж•ҲеҲ—ж•ёпјҡ${validRows.length}`);

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // ж”¶йӣҶд»Ҡж—Ҙ / жҳҺж—ҘдәӢд»¶
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  const todayEvs=[], tmrEvs=[], tickEvs=[];

  validRows.forEach(r => {
    const cn = r[CASE_COL] || '(жңӘе‘ҪеҗҚ)';

    // AP жҺЎиіјд»ҳж¬ҫ
    AP_DATES.forEach((dc,i) => {
      const d=parseDate(r[dc]); if(!d) return;
      const amt=fmtAmt(r[AP_AMTS[i]], r[AP_CURS[i]]);
      const label=`${cn}пҪң${r[AP_NAMES[i]]||'жҺЎиіјж¬ҫ'}`;
      if(sameDay(d,T))  {todayEvs.push({tag:'AP',name:label,amt}); tickEvs.push({tag:'AP',name:cn,amt,day:'today'});}
      if(sameDay(d,TM)) {tmrEvs.push({tag:'AP',name:label,amt});   tickEvs.push({tag:'AP',name:cn,amt,day:'tmr'});}
    });

    // AR йҠ·е”®ж”¶ж¬ҫ
    AR_DATES.forEach((dc,i) => {
      const d=parseDate(r[dc]); if(!d) return;
      const amt=fmtAmt(r[AR_AMTS[i]], r[AR_CURS[i]]);
      const label=`${cn}пҪң${r[AR_NAMES[i]]||'йҠ·е”®ж¬ҫ'}`;
      if(sameDay(d,T))  {todayEvs.push({tag:'AR',name:label,amt}); tickEvs.push({tag:'AR',name:cn,amt,day:'today'});}
      if(sameDay(d,TM)) {tmrEvs.push({tag:'AR',name:label,amt});   tickEvs.push({tag:'AR',name:cn,amt,day:'tmr'});}
    });

    // ETD
    const etd=parseDate(r[ETD_COL]);
    if(etd){
      if(sameDay(etd,T))  {todayEvs.push({tag:'ETD',name:cn,amt:''}); tickEvs.push({tag:'ETD',name:cn,amt:'',day:'today'});}
      if(sameDay(etd,TM)) {tmrEvs.push({tag:'ETD',name:cn,amt:''});   tickEvs.push({tag:'ETD',name:cn,amt:'',day:'tmr'});}
    }
    // ETA
    const eta=parseDate(r[ETA_COL]);
    if(eta){
      if(sameDay(eta,T))  {todayEvs.push({tag:'ETA',name:cn,amt:''}); tickEvs.push({tag:'ETA',name:cn,amt:'',day:'today'});}
      if(sameDay(eta,TM)) {tmrEvs.push({tag:'ETA',name:cn,amt:''});   tickEvs.push({tag:'ETA',name:cn,amt:'',day:'tmr'});}
    }
  });

  // ж”¶ж¬ҫзөұиЁҲиЎЁиЈңе…… AR/AP
  const PAY_DATE = payFields.find(f=>f.includes('ж”¶ж¬ҫж—Ҙ')||f.includes('д»ҳж¬ҫж—Ҙ'));
  const PAY_NOTE = payFields.find(f=>f==='еӮҷиЁ»') || payFields[4];
  const PAY_NTD  = payFields.find(f=>f==='NTD');
  if(PAY_DATE){
    payRows.filter(r=>r[PAY_NOTE]?.trim()).forEach(r=>{
      const d=parseDate(r[PAY_DATE]); if(!d) return;
      const name=r[PAY_NOTE]||r['йғЁй–Җ']||'(ж”¶ж¬ҫ)';
      const amt=fmtAmt(r[PAY_NTD],'NTD');
      const tag=(r['зӢҖж…Ӣ']||'').includes('д»ҳ')?'AP':'AR';
      if(sameDay(d,T))  {todayEvs.push({tag,name,amt}); tickEvs.push({tag,name,amt,day:'today'});}
      if(sameDay(d,TM)) {tmrEvs.push({tag,name,amt});   tickEvs.push({tag,name,amt,day:'tmr'});}
    });
  }

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // иЎҢдәӢжӣҶ
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  const calTotal=todayEvs.length+tmrEvs.length;
  const bCal=document.getElementById('b-cal');
  bCal.textContent=calTotal; bCal.className='badge '+(calTotal>0?'hot':'zero');

  document.getElementById('ev-today').innerHTML = todayEvs.length
    ? todayEvs.map(e=>evHTML(e.tag,e.name,e.amt)).join('')
    : '<div class="empty">вң… д»Ҡж—Ҙз„Ўеҫ…иҫҰдәӢд»¶</div>';
  document.getElementById('ev-tmr').innerHTML = tmrEvs.length
    ? tmrEvs.map(e=>evHTML(e.tag,e.name,e.amt)).join('')
    : '<div class="empty">вң… жҳҺж—Ҙз„Ўеҫ…иҫҰдәӢд»¶</div>';

  // и·‘йҰ¬зҮҲ
  document.getElementById('tickerTrack').innerHTML = tickEvs.length
    ? [...tickEvs,...tickEvs].map(e=>`<span class="ti">
        <span class="${e.day==='today'?'ti-today':'ti-tmr'}">${e.day==='today'?'д»Ҡж—Ҙ':'жҳҺж—Ҙ'}</span>
        <span class="ti-tag ${e.tag.toLowerCase()}">${e.tag}</span>
        <span>${e.name}</span>
        ${e.amt?`<span style="color:var(--text3);font-size:11px">${e.amt}</span>`:''}
      </span>`).join('')
    : '<span class="ti" style="color:var(--text3)">вң… д»ҠжҳҺе…©ж—Ҙз„Ўеҫ…иҫҰдәӢд»¶</span>';

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // жҺЎиіј/йҠ·е”®ж ёе°Қ
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  const unmapped=validRows.filter(r=>{
    const hp=AP_DATES.some(c=>r[c]?.trim());
    const hs=AR_DATES.some(c=>r[c]?.trim());
    const tp=r[TYPE_COL]||'';
    return hp&&!hs&&(tp.includes('жҺЎиіј')||tp.includes('дёүи§’'));
  });

  document.getElementById('b-map').textContent=unmapped.length;
  document.getElementById('b-map').className='badge '+(unmapped.length>0?'hot':'ok');
  const mb=document.getElementById('map-banner');
  mb.className='banner '+(unmapped.length>0?'warn':'good');
  mb.innerHTML=unmapped.length>0
    ?`рҹ”ҙ зҷјзҸҫ <strong>${unmapped.length}</strong> зӯҶжҺЎиіјжңӘе°ҚжҮүеҲ°йҠ·е”®`
    :'вң… жүҖжңүжҺЎиіјеқҮе·Іе°ҚжҮүеҲ°йҠ·е”®';

  const DISP=[CASE_COL,BIZ_COL,SUP_COL,CUS_COL,TYPE_COL];
  let mapHTML='';
  if(unmapped.length){
    mapHTML+=`<div class="th"><div><div class="th-t">рҹ”ҙ жҺЎиіјжңӘе°ҚжҮүйҠ·е”®пјҲ${unmapped.length}зӯҶпјү</div></div></div>
    <div class="tw"><table><thead><tr>${DISP.map(c=>`<th>${c}</th>`).join('')}<th>жҺЎиіјжңҹ1ж—Ҙ</th><th>зӢҖж…Ӣ</th></tr></thead>
    <tbody>${unmapped.map(r=>`<tr>${DISP.map(c=>`<td>${r[c]||'-'}</td>`).join('')}
      <td style="font-family:'JetBrains Mono',monospace">${fmt(parseDate(r['жҺЎиіјжңҹ1й җиЁҲж—Ҙ']))}</td>
      <td><span class="pill warn">вҡ пёҸ жңӘе°ҚжҮү</span></td></tr>`).join('')}</tbody></table></div>`;
  }
  mapHTML+=`<div class="th">
    <div><div class="th-t">рҹ“Ӣ е…ЁйғЁжЎҲд»¶пјҲ${validRows.length}зӯҶпјү</div></div>
    <input class="srch" placeholder="жҗңе°ӢжЎҲд»¶/е®ўжҲ¶/дҫӣжҮүе•Ҷ..." oninput="ftbl(this.value,'ftable')">
  </div>
  <div class="tw"><table id="ftable"><thead><tr>
    ${DISP.map(c=>`<th>${c}</th>`).join('')}<th>жҺЎиіј</th><th>йҠ·е”®</th><th>ETD</th><th>ETA</th>
  </tr></thead><tbody>
  ${validRows.map(r=>{
    const hp=AP_DATES.some(c=>r[c]?.trim());
    const hs=AR_DATES.some(c=>r[c]?.trim());
    const etd=parseDate(r[ETD_COL]), eta=parseDate(r[ETA_COL]);
    const st=hp&&hs?'<span class="pill ok">вң… е®Ңж•ҙ</span>'
      :hp&&!hs?'<span class="pill warn">вҡ пёҸ з„ЎйҠ·е”®</span>'
      :!hp&&hs?'<span class="pill err">вқҢ з„ЎжҺЎиіј</span>'
      :'<span class="pill pend">еҫ…зўәиӘҚ</span>';
    return `<tr>${DISP.map(c=>`<td>${r[c]||'-'}</td>`).join('')}
      <td><span class="pill ${hp?'ok':'pend'}">${hp?'вң…':'вҖ”'}</span></td>
      <td>${st}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${etd?fmt(etd):'-'}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${eta?fmt(eta):'-'}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
  document.getElementById('map-body').innerHTML=mapHTML;

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // ETD/ETA иҝҪи№Ө
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  const ships=[];
  validRows.forEach(r=>{
    const name=r[CASE_COL]||'(жңӘе‘ҪеҗҚ)', sup=r[SUP_COL]||'', cust=r[CUS_COL]||'';
    const etd=parseDate(r[ETD_COL]); if(etd) ships.push({type:'ETD',date:etd,name,sup,cust});
    const eta=parseDate(r[ETA_COL]); if(eta) ships.push({type:'ETA',date:eta,name,sup,cust});
  });
  ships.sort((a,b)=>a.date-b.date);

  const now=getToday();
  const overdue=ships.filter(e=>e.date<now);
  const upcoming=ships.filter(e=>e.date>=now);
  const todayS=ships.filter(e=>sameDay(e.date,T));
  const tmrS=ships.filter(e=>sameDay(e.date,TM));

  document.getElementById('b-ship').textContent=todayS.length+tmrS.length;
  document.getElementById('b-ship').className='badge '+((todayS.length+tmrS.length)>0?'hot':'zero');

  const tlHTML=evts=>evts.map(e=>`<div class="tli">
    <div class="tl-dt">${fmt(e.date)}</div>
    <div class="tl-ln ${e.date<now?'over':e.type.toLowerCase()}"></div>
    <div class="tl-b"><div class="tl-n">${e.name}</div>
    <div class="tl-m">[${e.type}]${e.sup?' дҫӣжҮүе•Ҷ: '+e.sup:''}${e.cust?' пҪң е®ўжҲ¶: '+e.cust:''}</div></div>
  </div>`).join('');

  let shipHTML=`<div class="cg" style="margin-bottom:20px">
    <div class="card today"><div class="card-t">рҹҡў д»Ҡж—ҘеҮәе…ҘиІЁ</div><div class="evl">
      ${todayS.length?todayS.map(e=>evHTML(e.type,e.name,'')).join(''):'<div class="empty">вң… д»Ҡж—Ҙз„ЎеҮәе…ҘиІЁ</div>'}
    </div></div>
    <div class="card tmr"><div class="card-t">рҹҡў жҳҺж—ҘеҮәе…ҘиІЁ</div><div class="evl">
      ${tmrS.length?tmrS.map(e=>evHTML(e.type,e.name,'')).join(''):'<div class="empty">вң… жҳҺж—Ҙз„ЎеҮәе…ҘиІЁ</div>'}
    </div></div>
  </div>`;
  if(overdue.length) shipHTML+=`<div class="tls"><div class="tlh" style="color:var(--red)">вҡ пёҸ йҖҫжңҹпјҲ${overdue.length}зӯҶпјү</div>${tlHTML(overdue)}</div>`;
  const upETD=upcoming.filter(e=>e.type==='ETD'), upETA=upcoming.filter(e=>e.type==='ETA');
  shipHTML+=`
    <div class="tls"><div class="tlh" style="color:var(--blue)">рҹ“Ө еҚіе°ҮеҮәиІЁ ETDпјҲ${upETD.length}зӯҶпјү</div>${upETD.length?tlHTML(upETD):'<div class="empty">жҡ«з„Ў</div>'}</div>
    <div class="tls"><div class="tlh" style="color:var(--yellow)">рҹ“Ҙ еҚіе°ҮеҲ°иІЁ ETAпјҲ${upETA.length}зӯҶпјү</div>${upETA.length?tlHTML(upETA):'<div class="empty">жҡ«з„Ў</div>'}</div>`;
  document.getElementById('ship-body').innerHTML=shipHTML;

  const n=new Date();
  document.getElementById('rtime').textContent=`жңҖеҫҢжӣҙж–° ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function ftbl(q,id){
  document.querySelectorAll(`#${id} tbody tr`).forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

init();
setInterval(init,5*60*1000);
</script>
</body>
</html>
