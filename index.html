<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 管理中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
    --text:#e6edf3;--text2:#8b949e;--text3:#656d76;
    --accent:#f0883e;--blue:#58a6ff;--green:#3fb950;
    --red:#f85149;--yellow:#d29922;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  /* TICKER */
  .ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:38px;position:sticky;top:0;z-index:100;display:flex;align-items:center;}
  .ticker-pill{flex-shrink:0;background:var(--accent);color:#000;font-weight:700;font-size:11px;padding:3px 12px;margin-left:12px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
  .ticker-area{flex:1;overflow:hidden;height:100%;position:relative;}
  .ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll 50s linear infinite;}
  .ticker-track:hover{animation-play-state:paused;}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ti{display:inline-flex;align-items:center;gap:6px;padding:0 20px;border-right:1px solid var(--border);font-size:12px;font-family:'JetBrains Mono',monospace;}
  .ti-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
  .ti-tag.ar {background:rgba(63,185,80,.2);color:var(--green);}
  .ti-tag.ap {background:rgba(248,81,73,.2);color:var(--red);}
  .ti-tag.etd{background:rgba(88,166,255,.2);color:var(--blue);}
  .ti-tag.eta{background:rgba(210,153,34,.2);color:var(--yellow);}
  .ti-today{color:var(--accent);font-size:10px;}
  .ti-tmr  {color:var(--green);font-size:10px;}

  /* HEADER */
  .hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .hdr-t{font-size:18px;font-weight:700;}
  .hdr-d{color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
  .hdr-r{display:flex;align-items:center;gap:10px;}
  .btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn:hover{border-color:var(--blue);}
  .rtime{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace;}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
  .tab{padding:11px 18px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:var(--blue);}
  .badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;min-width:18px;text-align:center;}
  .badge.hot {background:var(--red);color:#fff;}
  .badge.ok  {background:var(--green);color:#000;}
  .badge.zero{background:var(--bg3);color:var(--text3);}

  /* PANE */
  .pane{display:none;padding:20px 24px;}
  .pane.active{display:block;}

  /* CARDS */
  .cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
  .card.today{border-left:3px solid var(--accent);}
  .card.tmr  {border-left:3px solid var(--green);}
  .card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
  .card.today .card-t{color:var(--accent);}
  .card.tmr   .card-t{color:var(--green);}

  /* EVENTS */
  .evl{display:flex;flex-direction:column;gap:5px;}
  .ev{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg3);border-radius:6px;}
  .ev-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;min-width:34px;text-align:center;}
  .ev-tag.ar {background:rgba(63,185,80,.15);color:var(--green);}
  .ev-tag.ap {background:rgba(248,81,73,.15);color:var(--red);}
  .ev-tag.etd{background:rgba(88,166,255,.15);color:var(--blue);}
  .ev-tag.eta{background:rgba(210,153,34,.15);color:var(--yellow);}
  .ev-n{flex:1;font-size:13px;}
  .ev-a{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);flex-shrink:0;}
  .empty{text-align:center;padding:24px;color:var(--text3);font-size:13px;}

  /* BANNERS */
  .banner{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:16px;}
  .banner.warn{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);}
  .banner.good{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);}
  .banner.info{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);color:var(--blue);}

  /* TABLE */
  .th{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
  .th-t{font-size:14px;font-weight:600;}
  .th-s{font-size:12px;color:var(--text3);margin-top:2px;}
  .srch{padding:7px 13px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;width:210px;font-family:inherit;}
  .srch:focus{outline:none;border-color:var(--blue);}
  .srch::placeholder{color:var(--text3);}
  .tw{border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{background:var(--bg3);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:9px 13px;border-bottom:1px solid var(--border);white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .pill.ok  {background:rgba(63,185,80,.15);color:var(--green);}
  .pill.warn{background:rgba(210,153,34,.15);color:var(--yellow);}
  .pill.err {background:rgba(248,81,73,.15);color:var(--red);}
  .pill.pend{background:rgba(88,166,255,.1);color:var(--blue);}

  /* TIMELINE */
  .tls{margin-bottom:24px;}
  .tlh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px;}
  .tli{display:flex;align-items:stretch;margin-bottom:5px;}
  .tl-dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);width:86px;flex-shrink:0;padding-top:10px;}
  .tl-ln{width:2px;background:var(--border);margin:0 14px;flex-shrink:0;position:relative;}
  .tl-ln::before{content:'';position:absolute;top:11px;left:-4px;width:10px;height:10px;border-radius:50%;}
  .tl-ln.etd::before{background:var(--blue);}
  .tl-ln.eta::before{background:var(--yellow);}
  .tl-ln.over::before{background:var(--red);}
  .tl-b{flex:1;padding:8px 12px;background:var(--bg3);border-radius:6px;}
  .tl-n{font-size:13px;}
  .tl-m{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

  .spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .ldg{display:flex;align-items:center;gap:12px;padding:32px;color:var(--text3);font-size:13px;}

  @media(max-width:700px){.cg{grid-template-columns:1fr;}.hdr{flex-direction:column;gap:10px;align-items:flex-start;}}
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-pill">📅 今明提醒</div>
  <div class="ticker-area">
    <div class="ticker-track" id="tickerTrack">
      <span class="ti"><span style="color:var(--text3)">資料載入中...</span></span>
    </div>
  </div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-t">📦 PM 管理中心</div>
    <div class="hdr-d" id="hDate"></div>
  </div>
  <div class="hdr-r">
    <span class="rtime" id="rtime"></span>
    <button class="btn" onclick="init()">🔄 重新整理</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-cal"  onclick="go('cal')">📅 行事曆提醒 <span class="badge zero" id="b-cal">0</span></div>
  <div class="tab"        id="tab-map"  onclick="go('map')">🔍 採購/銷售核對 <span class="badge zero" id="b-map">0</span></div>
  <div class="tab"        id="tab-ship" onclick="go('ship')">🚢 ETD/ETA 追蹤 <span class="badge zero" id="b-ship">0</span></div>
</div>

<div class="pane active" id="pane-cal">
  <div class="cg">
    <div class="card today"><div class="card-t">🔴 今日事件</div><div class="evl" id="ev-today"><div class="ldg"><div class="spin"></div>載入中...</div></div></div>
    <div class="card tmr">  <div class="card-t">🟡 明日事件</div><div class="evl" id="ev-tmr">  <div class="ldg"><div class="spin"></div>載入中...</div></div></div>
  </div>
</div>

<div class="pane" id="pane-map">
  <div id="map-banner" class="banner info">🔄 載入中...</div>
  <div id="map-body"></div>
</div>

<div class="pane" id="pane-ship">
  <div id="ship-body"><div class="ldg"><div class="spin"></div>載入中...</div></div>
</div>

<script>
// ── Sheet 設定 ─────────────────────────────────────────────
const SHEETS = {
  purchase: { id:'1g6fdEEKRnBJ0hxUZaxb9RDZFmIALXTzkmsWVqp3LTF4', gid:'0' },
  payment:  { id:'18BgBt0l9GxmTzWSmeMnTLqD5CE8nobkPPlzZxaD_zLY',  gid:'0' },
  system:   { id:'1qIHKxU-42qDVT2WDcLZp1Z3Ixg1_VRTURJ96uAVfyhM',  gid:'953244165' },
};

// ── 確切欄位名稱（來自你的試算表）─────────────────────────
const AP_DATES = ['採購期1預計日','採購期2預計日','採購期3預計日'];
const AP_NAMES = ['採購期1名稱','採購期2名稱','採購期3名稱'];
const AP_AMTS  = ['採購期1金額','採購期2金額','採購期3金額'];
const AP_CURS  = ['採購期1幣別','採購期2幣別','採購期3幣別'];
const AR_DATES = ['銷售期1預計日','銷售期2預計日','銷售期3預計日'];
const AR_NAMES = ['銷售期1名稱','銷售期2名稱','銷售期3名稱'];
const AR_AMTS  = ['銷售期1金額','銷售期2金額','銷售期3金額'];
const AR_CURS  = ['銷售期1幣別','銷售期2幣別','銷售期3幣別'];
const ETD_COL  = 'ETD 出貨日';
const ETA_COL  = 'ETA 到貨日';
const CASE_COL = '案件名稱';
const BIZ_COL  = '業務名稱';
const SUP_COL  = '供應商（賣方）';
const CUS_COL  = '客戶（買方）';
const TYPE_COL = '案件屬性';

// ── 日期工具 ───────────────────────────────────────────────
const today    = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const tomorrow = () => { const d=today(); d.setDate(d.getDate()+1); return d; };

function parseDate(v) {
  if (v===null||v===undefined||v==='') return null;
  if (v instanceof Date) return isNaN(v)?null:v;
  // Google Sheets serial number
  if (typeof v==='number') {
    const d=new Date(Math.round((v-25569)*86400*1000));
    return isNaN(d)?null:d;
  }
  if (typeof v==='string') {
    // Date(year,month,day) format from gviz
    const m=v.match(/Date\((\d+),(\d+),(\d+)/);
    if (m) return new Date(+m[1],+m[2],+m[3]);
    // 2026/4/20 or 2026-04-20
    const s=v.trim().replace(/\//g,'-');
    const d=new Date(s);
    if (!isNaN(d)) return d;
  }
  return null;
}

function sameDay(a,b){
  if(!a||!b)return false;
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
function fmt(d){ if(!d)return '-'; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtAmt(v,cur){ const n=parseFloat(String(v||'').replace(/[^0-9.-]/g,'')); return (isNaN(n)||n===0)?'':`${n.toLocaleString()}${cur?' '+cur:''}`; }

// ── 讀取 Sheet ─────────────────────────────────────────────
async function fetchSheet(key) {
  const s=SHEETS[key];
  const url=`https://docs.google.com/spreadsheets/d/${s.id}/gviz/tq?tqx=out:json&gid=${s.gid}&t=${Date.now()}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const txt=await res.text();
  // gviz wraps in callback, strip it
  const jsonStr=txt.replace(/^[^(]+\(/,'').replace(/\);\s*$/,'');
  const json=JSON.parse(jsonStr);
  const cols=json.table.cols.map(c=>c.label||'');
  const rows=(json.table.rows||[]).map(r=>{
    const obj={};
    cols.forEach((c,i)=>{ const cell=r.c?r.c[i]:null; obj[c]=cell?(cell.v!==undefined?cell.v:cell.f):null; });
    return obj;
  });
  return {cols,rows};
}

// ── Tab ────────────────────────────────────────────────────
function go(n){
  ['cal','map','ship'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===n);
    document.getElementById('pane-'+x).classList.toggle('active',x===n);
  });
}

// ── Event HTML ─────────────────────────────────────────────
const evHTML=(tag,name,amt)=>`<div class="ev"><span class="ev-tag ${tag.toLowerCase()}">${tag}</span><span class="ev-n">${name||'(未命名)'}</span>${amt?`<span class="ev-a">${amt}</span>`:''}</div>`;

// ── 主邏輯 ─────────────────────────────────────────────────
async function init(){
  const T=today(), TM=tomorrow();
  document.getElementById('hDate').textContent=fmt(T)+' （今日）';
  document.getElementById('rtime').textContent='更新中...';

  let data;
  try { data=await fetchSheet('purchase'); }
  catch(e){
    const msg=`<div class="banner warn">⚠️ 讀取失敗：試算表需設為「知道連結的任何人可以檢視」<br><small style="opacity:.7">${e.message}</small></div>`;
    ['ev-today','ev-tmr'].forEach(id=>document.getElementById(id).innerHTML=msg);
    document.getElementById('map-banner').outerHTML=msg;
    document.getElementById('ship-body').innerHTML=msg;
    document.getElementById('rtime').textContent='讀取失敗';
    return;
  }

  const rows=data.rows.filter(r=>r[CASE_COL]||r[BIZ_COL]); // 過濾空列

  // ── 收集事件 ───────────────────────────────────────────
  const todayEvs=[],tmrEvs=[],tickEvs=[];

  rows.forEach(r=>{
    const cn=r[CASE_COL]||'(未命名)';

    // AP 採購付款
    AP_DATES.forEach((dc,i)=>{
      const d=parseDate(r[dc]); if(!d)return;
      const amt=fmtAmt(r[AP_AMTS[i]],r[AP_CURS[i]]);
      const label=`${cn}｜${r[AP_NAMES[i]]||'採購款'}`;
      if(sameDay(d,T)) { todayEvs.push({tag:'AP',name:label,amt}); tickEvs.push({tag:'AP',name:cn,amt,day:'today'}); }
      if(sameDay(d,TM)){ tmrEvs.push({tag:'AP',name:label,amt});   tickEvs.push({tag:'AP',name:cn,amt,day:'tmr'}); }
    });

    // AR 銷售收款
    AR_DATES.forEach((dc,i)=>{
      const d=parseDate(r[dc]); if(!d)return;
      const amt=fmtAmt(r[AR_AMTS[i]],r[AR_CURS[i]]);
      const label=`${cn}｜${r[AR_NAMES[i]]||'銷售款'}`;
      if(sameDay(d,T)) { todayEvs.push({tag:'AR',name:label,amt}); tickEvs.push({tag:'AR',name:cn,amt,day:'today'}); }
      if(sameDay(d,TM)){ tmrEvs.push({tag:'AR',name:label,amt});   tickEvs.push({tag:'AR',name:cn,amt,day:'tmr'}); }
    });

    // ETD
    const etd=parseDate(r[ETD_COL]);
    if(etd){
      if(sameDay(etd,T)) { todayEvs.push({tag:'ETD',name:cn,amt:''}); tickEvs.push({tag:'ETD',name:cn,amt:'',day:'today'}); }
      if(sameDay(etd,TM)){ tmrEvs.push({tag:'ETD',name:cn,amt:''});   tickEvs.push({tag:'ETD',name:cn,amt:'',day:'tmr'}); }
    }

    // ETA
    const eta=parseDate(r[ETA_COL]);
    if(eta){
      if(sameDay(eta,T)) { todayEvs.push({tag:'ETA',name:cn,amt:''}); tickEvs.push({tag:'ETA',name:cn,amt:'',day:'today'}); }
      if(sameDay(eta,TM)){ tmrEvs.push({tag:'ETA',name:cn,amt:''});   tickEvs.push({tag:'ETA',name:cn,amt:'',day:'tmr'}); }
    }
  });

  // ── 行事曆 ─────────────────────────────────────────────
  const calTotal=todayEvs.length+tmrEvs.length;
  const bCal=document.getElementById('b-cal');
  bCal.textContent=calTotal; bCal.className='badge '+(calTotal>0?'hot':'zero');

  document.getElementById('ev-today').innerHTML=todayEvs.length
    ?todayEvs.map(e=>evHTML(e.tag,e.name,e.amt)).join('')
    :'<div class="empty">✅ 今日無待辦事件</div>';
  document.getElementById('ev-tmr').innerHTML=tmrEvs.length
    ?tmrEvs.map(e=>evHTML(e.tag,e.name,e.amt)).join('')
    :'<div class="empty">✅ 明日無待辦事件</div>';

  // ── 跑馬燈 ─────────────────────────────────────────────
  if(!tickEvs.length){
    document.getElementById('tickerTrack').innerHTML='<span class="ti" style="color:var(--text3)">✅ 今明兩日無待辦事件</span>';
  } else {
    const html=[...tickEvs,...tickEvs].map(e=>`<span class="ti">
      <span class="${e.day==='today'?'ti-today':'ti-tmr'}">${e.day==='today'?'今日':'明日'}</span>
      <span class="ti-tag ${e.tag.toLowerCase()}">${e.tag}</span>
      <span>${e.name}</span>
      ${e.amt?`<span style="color:var(--text3);font-size:11px">${e.amt}</span>`:''}
    </span>`).join('');
    document.getElementById('tickerTrack').innerHTML=html;
  }

  // ── 採購/銷售核對 ──────────────────────────────────────
  const unmapped=rows.filter(r=>{
    const hp=AP_DATES.some(c=>r[c]);
    const hs=AR_DATES.some(c=>r[c]);
    const type=(r[TYPE_COL]||'');
    return hp&&!hs&&(type.includes('採購')||type.includes('三角'));
  });

  const bMap=document.getElementById('b-map');
  bMap.textContent=unmapped.length;
  bMap.className='badge '+(unmapped.length>0?'hot':'ok');

  const mapBanner=document.getElementById('map-banner');
  mapBanner.className='banner '+(unmapped.length>0?'warn':'good');
  mapBanner.innerHTML=unmapped.length>0
    ?`🔴 發現 <strong>${unmapped.length}</strong> 筆採購未對應到銷售`
    :'✅ 所有採購均已對應到銷售';

  const DISP_COLS=[CASE_COL,BIZ_COL,SUP_COL,CUS_COL,TYPE_COL];
  let mapHTML='';

  if(unmapped.length){
    mapHTML+=`<div class="th"><div><div class="th-t">🔴 採購未對應銷售（${unmapped.length}筆）</div><div class="th-s">有採購付款日但無銷售收款日</div></div></div>
    <div class="tw" style="margin-bottom:20px"><table><thead><tr>
      ${DISP_COLS.map(c=>`<th>${c}</th>`).join('')}<th>採購期1預計日</th><th>狀態</th>
    </tr></thead><tbody>
      ${unmapped.map(r=>`<tr>${DISP_COLS.map(c=>`<td>${r[c]||'-'}</td>`).join('')}
      <td style="font-family:'JetBrains Mono',monospace">${fmt(parseDate(r['採購期1預計日']))}</td>
      <td><span class="pill warn">⚠️ 未對應</span></td></tr>`).join('')}
    </tbody></table></div>`;
  }

  mapHTML+=`<div class="th">
    <div><div class="th-t">📋 全部案件（${rows.length}筆）</div></div>
    <input class="srch" placeholder="搜尋案件/客戶/供應商..." oninput="ftbl(this.value,'ftable')">
  </div>
  <div class="tw"><table id="ftable"><thead><tr>
    ${DISP_COLS.map(c=>`<th>${c}</th>`).join('')}<th>採購</th><th>銷售</th><th>ETD</th><th>ETA</th>
  </tr></thead><tbody>
  ${rows.map(r=>{
    const hp=AP_DATES.some(c=>r[c]);
    const hs=AR_DATES.some(c=>r[c]);
    const etd=parseDate(r[ETD_COL]);
    const eta=parseDate(r[ETA_COL]);
    const st=hp&&hs?'<span class="pill ok">✅ 完整</span>'
      :hp&&!hs?'<span class="pill warn">⚠️ 無銷售</span>'
      :!hp&&hs?'<span class="pill err">❌ 無採購</span>'
      :'<span class="pill pend">待確認</span>';
    return `<tr>${DISP_COLS.map(c=>`<td>${r[c]||'-'}</td>`).join('')}
      <td><span class="pill ${hp?'ok':'pend'}">${hp?'✅':'—'}</span></td>
      <td>${st}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${etd?fmt(etd):'-'}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${eta?fmt(eta):'-'}</td>
    </tr>`;
  }).join('')}
  </tbody></table></div>`;
  document.getElementById('map-body').innerHTML=mapHTML;

  // ── ETD/ETA 追蹤 ──────────────────────────────────────
  const ships=[];
  rows.forEach(r=>{
    const name=r[CASE_COL]||'(未命名)';
    const sup=r[SUP_COL]||''; const cust=r[CUS_COL]||'';
    const etd=parseDate(r[ETD_COL]); if(etd) ships.push({type:'ETD',date:etd,name,sup,cust});
    const eta=parseDate(r[ETA_COL]); if(eta) ships.push({type:'ETA',date:eta,name,sup,cust});
  });
  ships.sort((a,b)=>a.date-b.date);

  const now=today();
  const overdue =ships.filter(e=>e.date<now);
  const upcoming=ships.filter(e=>e.date>=now);
  const todayS  =ships.filter(e=>sameDay(e.date,T));
  const tmrS    =ships.filter(e=>sameDay(e.date,TM));
  const bShip=document.getElementById('b-ship');
  bShip.textContent=todayS.length+tmrS.length;
  bShip.className='badge '+((todayS.length+tmrS.length)>0?'hot':'zero');

  const tlHTML=evts=>evts.map(e=>{
    const cls=e.date<now?'over':e.type.toLowerCase();
    return `<div class="tli">
      <div class="tl-dt">${fmt(e.date)}</div>
      <div class="tl-ln ${cls}"></div>
      <div class="tl-b">
        <div class="tl-n">${e.name}</div>
        <div class="tl-m">[${e.type}]${e.sup?' 供應商: '+e.sup:''}${e.cust?' ｜ 客戶: '+e.cust:''}</div>
      </div>
    </div>`;
  }).join('');

  let shipHTML=`<div class="cg" style="margin-bottom:20px">
    <div class="card today"><div class="card-t">🚢 今日出入貨</div><div class="evl">
      ${todayS.length?todayS.map(e=>evHTML(e.type,e.name,'')).join(''):'<div class="empty">✅ 今日無出入貨</div>'}
    </div></div>
    <div class="card tmr"><div class="card-t">🚢 明日出入貨</div><div class="evl">
      ${tmrS.length?tmrS.map(e=>evHTML(e.type,e.name,'')).join(''):'<div class="empty">✅ 明日無出入貨</div>'}
    </div></div>
  </div>`;

  if(overdue.length){
    shipHTML+=`<div class="tls"><div class="tlh" style="color:var(--red)">⚠️ 逾期未完成（${overdue.length}筆）</div>${tlHTML(overdue)}</div>`;
  }

  const upETD=upcoming.filter(e=>e.type==='ETD');
  const upETA=upcoming.filter(e=>e.type==='ETA');
  shipHTML+=`
    <div class="tls"><div class="tlh" style="color:var(--blue)">📤 即將出貨 ETD（${upETD.length}筆）</div>
      ${upETD.length?tlHTML(upETD):'<div class="empty">暫無</div>'}
    </div>
    <div class="tls"><div class="tlh" style="color:var(--yellow)">📥 即將到貨 ETA（${upETA.length}筆）</div>
      ${upETA.length?tlHTML(upETA):'<div class="empty">暫無</div>'}
    </div>`;
  document.getElementById('ship-body').innerHTML=shipHTML;

  // 更新時間
  const n=new Date();
  document.getElementById('rtime').textContent=`最後更新 ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function ftbl(q,id){
  document.querySelectorAll(`#${id} tbody tr`).forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

init();
setInterval(init,5*60*1000);
</script>
</body>
</html>
