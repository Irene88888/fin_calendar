<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 管理中心</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#656d76;--accent:#f0883e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* TICKER */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:38px;position:sticky;top:0;z-index:100;display:flex;align-items:center;}
.ticker-pill{flex-shrink:0;background:var(--accent);color:#000;font-weight:700;font-size:11px;padding:3px 12px;margin-left:12px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.ticker-area{flex:1;overflow:hidden;height:100%;}
.ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll 60s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;padding:0 20px;border-right:1px solid var(--border);font-size:12px;font-family:'JetBrains Mono',monospace;}
.ti-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.ti-tag.ar{background:rgba(63,185,80,.2);color:var(--green);}
.ti-tag.ap{background:rgba(248,81,73,.2);color:var(--red);}
.ti-today{color:var(--accent);font-size:10px;}
.ti-tmr{color:var(--green);font-size:10px;}

/* HEADER */
.hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.hdr-t{font-size:18px;font-weight:700;}
.hdr-d{color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{border-color:var(--blue);}
.rtime{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;}
.tab{padding:11px 18px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--blue);}
.badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;min-width:18px;text-align:center;}
.badge.hot{background:var(--red);color:#fff;}
.badge.ok{background:var(--green);color:#000;}
.badge.zero{background:var(--bg3);color:var(--text3);}

/* PANE */
.pane{display:none;padding:20px 24px;}
.pane.active{display:block;}

/* CARDS */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.card.today{border-left:3px solid var(--accent);}
.card.tmr  {border-left:3px solid var(--green);}
.card.week {border-left:3px solid var(--blue);}
.card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card.today .card-t{color:var(--accent);}
.card.tmr   .card-t{color:var(--green);}
.card.week  .card-t{color:var(--blue);}
.card-date{font-weight:400;font-size:11px;opacity:.65;font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none;}

/* EVENT ROWS */
.evl{display:flex;flex-direction:column;gap:5px;}
.ev{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg3);border-radius:6px;}
.ev-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;min-width:42px;text-align:center;}
.ev-tag.ar{background:rgba(63,185,80,.15);color:var(--green);}
.ev-tag.ap{background:rgba(248,81,73,.15);color:var(--red);}
.ev-tag.etd{background:rgba(88,166,255,.15);color:var(--blue);}
.ev-tag.eta{background:rgba(210,153,34,.15);color:var(--yellow);}
.ev-n{flex:1;font-size:13px;}
.ev-a{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;flex-shrink:0;}
.ev-a.ar{color:var(--green);}
.ev-a.ap{color:var(--red);}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:13px;}

/* WEEK ZIP */
.wk-group{margin-bottom:6px;}
.wk-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg3);border-radius:8px;cursor:pointer;user-select:none;transition:background .15s;}
.wk-hdr:hover{background:#252d3a;}
.wk-hdr-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.wk-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);font-weight:600;flex-shrink:0;}
.wk-pills{display:flex;gap:6px;flex-wrap:wrap;}
.wk-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.wk-pill.ap{background:rgba(248,81,73,.15);color:var(--red);}
.wk-pill.ar{background:rgba(63,185,80,.15);color:var(--green);}
.wk-pill.none{background:var(--bg2);color:var(--text3);font-size:11px;}
.wk-arrow{color:var(--text3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.wk-arrow.open{transform:rotate(180deg);}
.wk-body{display:none;margin-top:5px;display:flex;flex-direction:column;gap:4px;}
.wk-body.collapsed{display:none;}

/* BANNER */
.banner{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:16px;line-height:1.6;}
.banner.warn{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);}
.banner.good{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);}
.banner.info{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);color:var(--blue);}

/* TABLE */
.th{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.th-t{font-size:14px;font-weight:600;}
.th-s{font-size:12px;color:var(--text3);margin-top:2px;}
.srch{padding:7px 13px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;width:210px;font-family:inherit;}
.srch:focus{outline:none;border-color:var(--blue);}
.srch::placeholder{color:var(--text3);}
.tw{border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg3);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 13px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.ok  {background:rgba(63,185,80,.15);color:var(--green);}
.pill.warn{background:rgba(210,153,34,.15);color:var(--yellow);}
.pill.err {background:rgba(248,81,73,.15);color:var(--red);}
.pill.pend{background:rgba(88,166,255,.1);color:var(--blue);}
.anno-sel{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;}
.anno-sel:hover,.anno-sel:focus{outline:none;border-color:var(--yellow);}

/* TIMELINE */
.tls{margin-bottom:24px;}
.tlh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px;}
.tli{display:flex;align-items:stretch;margin-bottom:5px;}
.tl-dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);width:86px;flex-shrink:0;padding-top:10px;}
.tl-ln{width:2px;background:var(--border);margin:0 14px;flex-shrink:0;position:relative;}
.tl-ln::before{content:'';position:absolute;top:11px;left:-4px;width:10px;height:10px;border-radius:50%;}
.tl-ln.etd::before{background:var(--blue);}
.tl-ln.eta::before{background:var(--yellow);}
.tl-ln.over::before{background:var(--red);}
.tl-b{flex:1;padding:8px 12px;background:var(--bg3);border-radius:6px;}
.tl-n{font-size:13px;}
.tl-m{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* DBG */
.dbg{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:12px;white-space:pre-wrap;max-height:300px;overflow-y:auto;line-height:1.7;}
.dbg-title{font-size:13px;color:var(--text2);margin:12px 0 6px;font-weight:600;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ldg{display:flex;align-items:center;gap:12px;padding:24px;color:var(--text3);font-size:13px;}
@media(max-width:700px){.cg{grid-template-columns:1fr;}.hdr{flex-direction:column;gap:10px;align-items:flex-start;}}
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-pill">📅 今明提醒</div>
  <div class="ticker-area"><div class="ticker-track" id="tickerTrack">
    <span class="ti"><span style="color:var(--text3)">載入中...</span></span>
  </div></div>
</div>
<div class="hdr">
  <div><div class="hdr-t">📦 PM 管理中心</div><div class="hdr-d" id="hDate"></div></div>
  <div class="hdr-r"><span class="rtime" id="rtime"></span><button class="btn" onclick="init()">🔄 重新整理</button></div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-cal"  onclick="go('cal')">📅 行事曆提醒 <span class="badge zero" id="b-cal">0</span></div>
  <div class="tab"        id="tab-map"  onclick="go('map')">🔍 採購/銷售核對 <span class="badge zero" id="b-map">0</span></div>
  <div class="tab"        id="tab-ship" onclick="go('ship')">🚢 ETD/ETA 追蹤 <span class="badge zero" id="b-ship">0</span></div>
  <div class="tab"        id="tab-dbg"  onclick="go('dbg')">🔧 診斷</div>
</div>

<!-- 行事曆：只顯示應收/應付 -->
<div class="pane active" id="pane-cal">
  <div class="cg">
    <div class="card today">
      <div class="card-t">🔴 今日應收付 <span class="card-date" id="label-today"></span></div>
      <div class="evl" id="ev-today"><div class="ldg"><div class="spin"></div>載入中...</div></div>
    </div>
    <div class="card tmr">
      <div class="card-t">🟡 明日應收付 <span class="card-date" id="label-tmr"></span></div>
      <div class="evl" id="ev-tmr"><div class="ldg"><div class="spin"></div>載入中...</div></div>
    </div>
  </div>
  <div class="card week">
    <div class="card-t">📆 本週應收付 <span class="card-date" id="label-week"></span></div>
    <div id="ev-week"><div class="ldg"><div class="spin"></div>載入中...</div></div>
  </div>
</div>

<div class="pane" id="pane-map">
  <div id="map-banner" class="banner info">🔄 載入中...</div>
  <div id="map-body"></div>
</div>
<div class="pane" id="pane-ship">
  <div id="ship-body"><div class="ldg"><div class="spin"></div>載入中...</div></div>
</div>
<div class="pane" id="pane-dbg">
  <h3 style="margin-bottom:12px;font-size:14px;color:var(--text2)">🔧 連線診斷</h3>
  <div id="dbg-body"><div class="ldg"><div class="spin"></div>診斷中...</div></div>
</div>

<script>
// ══ 設定 ═══════════════════════════════════════════
// 採購/銷售表（應收/應付來源）
var ID_PURCH  = '1qIHKxU-42qDVT2WDcLZp1Z3Ixg1_VRTURJ96uAVfyhM';
var GID_PURCH = '953244165';
// 收款統計表（另一個應收/應付來源）
var ID_PAY    = '18BgBt0l9GxmTzWSmeMnTLqD5CE8nobkPPlzZxaD_zLY';
var GID_PAY   = '0';
// 案件標記表
var ANNO_SHEET_ID = '1RFgUjaR4bzGoZrz355kmQ5__ZUwg7Blf9M2AgYbgyQE';
var ANNO_GID      = '0';

// 採購表欄位
var AP_DATES = ['採購期1預計日','採購期2預計日','採購期3預計日']; // 應付
var AP_NAMES = ['採購期1名稱','採購期2名稱','採購期3名稱'];
var AP_AMTS  = ['採購期1金額','採購期2金額','採購期3金額'];
var AP_CURS  = ['採購期1幣別','採購期2幣別','採購期3幣別'];
var AR_DATES = ['銷售期1預計日','銷售期2預計日','銷售期3預計日']; // 應收
var AR_NAMES = ['銷售期1名稱','銷售期2名稱','銷售期3名稱'];
var AR_AMTS  = ['銷售期1金額','銷售期2金額','銷售期3金額'];
var AR_CURS  = ['銷售期1幣別','銷售期2幣別','銷售期3幣別'];
var ETD_COL  = 'ETD 出貨日';
var ETA_COL  = 'ETA 到貨日';
var CASE_COL = '案件名稱';
var BIZ_COL  = '業務名稱';
var SUP_COL  = '供應商（賣方）';
var CUS_COL  = '客戶（買方）';
var TYPE_COL = '案件屬性';

var PAY_CURS = ['NTD','USD','JPY','EUR','ZAR'];
var ANNO_TYPES = {
  'stock':   {label:'📦 庫存出貨',color:'var(--yellow)'},
  'expense': {label:'💼 費用類',  color:'var(--purple)'},
  '':        {label:'— 正常',     color:'var(--text3)'}
};

// ══ 日期工具 ═══════════════════════════════════════
function getToday(){var d=new Date();d.setHours(0,0,0,0);return d;}
function getTomorrow(){var d=getToday();d.setDate(d.getDate()+1);return d;}
function parseDate(v){
  if(!v)return null;
  var s=String(v).trim();if(!s)return null;
  var dp=s.split(' ')[0].replace(/\//g,'-');
  var p=dp.split('-');
  if(p.length===3){var d=new Date(p[0].padStart(4,'0')+'-'+p[1].padStart(2,'0')+'-'+p[2].padStart(2,'0')+'T00:00:00');return isNaN(d.getTime())?null:d;}
  return null;
}
function sameDay(a,b){if(!a||!b)return false;return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmt(d){if(!d)return '-';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtN(n){return n.toLocaleString('en-US');}
function getWeekRange(base){
  var d=new Date(base),day=d.getDay();
  var mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return {mon:mon,sun:sun};
}
function inWeek(d,mon,sun){return d>=mon&&d<=sun;}

// ══ CSV ════════════════════════════════════════════
function fetchCSV(id,gid,skip){
  if(skip===undefined)skip=0;
  return new Promise(function(resolve,reject){
    Papa.parse('https://docs.google.com/spreadsheets/d/'+id+'/export?format=csv&gid='+gid+'&t='+Date.now(),{
      download:true,header:false,skipEmptyLines:true,
      complete:function(r){
        var all=r.data;if(!all.length){resolve({fields:[],rows:[]});return;}
        var h=all[skip]||[];
        resolve({fields:h,rows:all.slice(skip+1).map(function(row){var o={};h.forEach(function(k,i){o[k]=row[i]!==undefined?row[i]:'';});return o;})});
      },
      error:function(e){reject(e);}
    });
  });
}
function fetchAnnotations(){
  return new Promise(function(resolve){
    fetch('https://docs.google.com/spreadsheets/d/'+ANNO_SHEET_ID+'/export?format=csv&gid='+ANNO_GID+'&t='+Date.now())
      .then(function(r){return r.text();}).then(function(txt){
        var m={};
        txt.split('\n').forEach(function(l,i){if(i===0)return;var c=l.split(',');var k=(c[0]||'').replace(/"/g,'').trim();var t=(c[1]||'').replace(/"/g,'').trim();if(k)m[k]={type:t};});
        resolve(m);
      }).catch(function(){resolve({});});
  });
}

// ══ Tab ════════════════════════════════════════════
function go(n){['cal','map','ship','dbg'].forEach(function(x){var t=document.getElementById('tab-'+x),p=document.getElementById('pane-'+x);if(t)t.classList.toggle('active',x===n);if(p)p.classList.toggle('active',x===n);});}

// ══ 事件 HTML ══════════════════════════════════════
function evHTML(tag,name,amt){
  var L={AP:'應付',AR:'應收',ETD:'ETD',ETA:'ETA'};
  return '<div class="ev"><span class="ev-tag '+tag.toLowerCase()+'">'+(L[tag]||tag)+'</span>'
    +'<span class="ev-n">'+(name||'')+'</span>'
    +(amt?'<span class="ev-a '+tag.toLowerCase()+'">'+amt+'</span>':'')
    +'</div>';
}

// ══ 本週 ZIP 列 ════════════════════════════════════
function mkWkRow(dateLabel, evts) {
  // 摘要：按 AP/AR 分別按幣別加總
  var apSum={}, arSum={};
  evts.forEach(function(e){
    if(e.tag!=='AP'&&e.tag!=='AR')return;
    var target=e.tag==='AP'?apSum:arSum;
    if(e.cur&&e.rawAmt>0){
      if(!target[e.cur])target[e.cur]=0;
      target[e.cur]+=e.rawAmt;
    }
  });
  var pillsHTML='';
  Object.keys(apSum).forEach(function(cur){pillsHTML+='<span class="wk-pill ap">應付 '+cur+' '+fmtN(apSum[cur])+'</span>';});
  Object.keys(arSum).forEach(function(cur){pillsHTML+='<span class="wk-pill ar">應收 '+cur+' '+fmtN(arSum[cur])+'</span>';});
  if(!pillsHTML)pillsHTML='<span class="wk-pill none">無應收付</span>';

  var id='wk'+dateLabel.replace(/[^0-9]/g,'');
  return '<div class="wk-group">'
    +'<div class="wk-hdr" onclick="toggleWk(\''+id+'\')">'
    +'<div class="wk-hdr-left"><span class="wk-date">'+dateLabel+'</span><div class="wk-pills">'+pillsHTML+'</div></div>'
    +'<span class="wk-arrow" id="arr-'+id+'">▼</span>'
    +'</div>'
    +'<div class="wk-body collapsed" id="'+id+'">'
    +evts.map(function(e){return evHTML(e.tag,e.name,e.amtStr);}).join('')
    +'</div></div>';
}
function toggleWk(id){
  var b=document.getElementById(id),a=document.getElementById('arr-'+id);
  if(!b)return;
  var open=b.classList.toggle('collapsed');
  if(a)a.classList.toggle('open',!open);
}

// ══ 採購/銷售判斷 ══════════════════════════════════
function hasPurch(r){return AP_DATES.some(function(c){return r[c]&&r[c].trim();})||AP_AMTS.some(function(c){var v=r[c];return v&&parseFloat(String(v).replace(/,/g,''))>0;});}
function hasSale(r){return AR_DATES.some(function(c){return r[c]&&r[c].trim();})||AR_AMTS.some(function(c){var v=r[c];return v&&parseFloat(String(v).replace(/,/g,''))>0;})||['銷售期1名稱','銷售期2名稱','銷售期3名稱'].some(function(c){return r[c]&&r[c].trim();});}
function rowKey(r){return (r[CASE_COL]||'')+'|'+(r[BIZ_COL]||'')+'|'+(r[SUP_COL]||'');}
function ftbl(q,id){document.querySelectorAll('#'+id+' tbody tr').forEach(function(r){r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});}

// ══ 標記面板 ═══════════════════════════════════════
function setAnnotation(key,type,cn){
  var sa;try{sa=JSON.parse(sessionStorage.getItem('pm_anno')||'{}');}catch(e){sa={};}
  if(type){sa[key]={type:type};}else{delete sa[key];}
  try{sessionStorage.setItem('pm_anno',JSON.stringify(sa));}catch(e){}
  showAnnoPanel(key,type,cn);init();
}
function showAnnoPanel(key,type,cn){
  var p=document.getElementById('anno-panel');
  if(!p){p=document.createElement('div');p.id='anno-panel';p.style.cssText='position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;font-size:13px;z-index:999;width:400px;box-shadow:0 8px 32px rgba(0,0,0,.5)';document.body.appendChild(p);}
  var ti=ANNO_TYPES[type||'']||ANNO_TYPES[''];
  var sheetURL='https://docs.google.com/spreadsheets/d/'+ANNO_SHEET_ID+'/edit';
  var rowText=key+'\t'+(type||'')+'\t\t'+new Date().toLocaleString('zh-TW');
  p.innerHTML='';
  var hdr=document.createElement('div');hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
  var ts=document.createElement('span');ts.style.cssText='font-weight:700;color:var(--text)';ts.textContent=type?(ti.label+' 已標記'):'已取消標記';
  var cb=document.createElement('button');cb.textContent='✕';cb.style.cssText='background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer';cb.onclick=function(){p.style.display='none';};
  hdr.appendChild(ts);hdr.appendChild(cb);p.appendChild(hdr);
  var cd=document.createElement('div');cd.style.cssText='color:var(--text2);margin-bottom:10px;font-size:12px';cd.innerHTML='案件：<strong style="color:var(--text)">'+cn+'</strong>';p.appendChild(cd);
  var box=document.createElement('div');box.style.cssText='background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:12px';
  var ht=document.createElement('div');ht.style.cssText='color:var(--text3);font-size:11px;margin-bottom:6px';ht.textContent='📋 複製以下資料貼到 Google Sheet 新列（A欄）：';box.appendChild(ht);
  var code=document.createElement('code');code.style.cssText="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);word-break:break-all;display:block";code.textContent=rowText;box.appendChild(code);
  var cpb=document.createElement('button');cpb.className='btn';cpb.style.cssText='margin-top:8px;font-size:12px;padding:4px 12px';cpb.textContent='📋 複製';
  cpb.onclick=function(){navigator.clipboard.writeText(rowText);cpb.textContent='✅ 已複製!';setTimeout(function(){cpb.textContent='📋 複製';},1500);};
  box.appendChild(cpb);p.appendChild(box);
  var lk=document.createElement('a');lk.href=sheetURL;lk.target='_blank';lk.style.cssText='display:block;text-align:center;padding:8px;border-radius:8px;background:var(--blue);color:#000;font-weight:700;font-size:13px;text-decoration:none';lk.textContent='📂 開啟 Google Sheet 貼入';p.appendChild(lk);
  p.style.display='block';
}

// ══ 主邏輯 ═════════════════════════════════════════
async function init(){
  var T=getToday(),TM=getTomorrow();
  var wk=getWeekRange(T),WK_MON=wk.mon,WK_SUN=wk.sun;
  var DAYS=['日','一','二','三','四','五','六'];

  document.getElementById('hDate').textContent=fmt(T)+' （今日）';
  document.getElementById('label-today').textContent=fmt(T);
  document.getElementById('label-tmr').textContent=fmt(TM);
  document.getElementById('label-week').textContent=fmt(WK_MON)+' ～ '+fmt(WK_SUN);
  document.getElementById('rtime').textContent='更新中...';

  var dbg=[];

  // 採購/銷售表
  var purchRows=[],purchFields=[];
  try{
    var pr=await fetchCSV(ID_PURCH,GID_PURCH,0);
    purchFields=pr.fields;purchRows=pr.rows;
    dbg.push('[採購表] ✅ '+purchRows.length+'列  欄位：'+purchFields.slice(0,6).join('|'));
  }catch(e){dbg.push('[採購表] ❌ '+e);}

  // 收款統計表（skip 2 rows）
  var payRows=[],payFields=[];
  try{
    var pr2=await fetchCSV(ID_PAY,GID_PAY,2);
    payFields=pr2.fields;payRows=pr2.rows;
    dbg.push('[收款表] ✅ '+payRows.length+'列  欄位：'+payFields.slice(0,8).join('|'));
    if(payRows[0])dbg.push('收款表第1筆：'+JSON.stringify(payRows[0]).substring(0,250));
  }catch(e){dbg.push('[收款表] ❌ '+e);}

  // 標記
  var sheetAnno=await fetchAnnotations();
  var sessionAnno;try{sessionAnno=JSON.parse(sessionStorage.getItem('pm_anno')||'{}');}catch(e){sessionAnno={};}
  var annoMap=Object.assign({},sheetAnno,sessionAnno);

  // 診斷
  document.getElementById('dbg-body').innerHTML=
    '<div class="dbg">'+dbg.join('\n')+'</div>'
    +'<div class="dbg-title">採購表欄位：</div><div class="dbg">'+(purchFields.join('\n')||'(無)')+'</div>'
    +'<div class="dbg-title">採購表第1筆：</div><div class="dbg">'+JSON.stringify(purchRows[0]||{},null,2)+'</div>'
    +'<div class="dbg-title">收款表欄位：</div><div class="dbg">'+(payFields.join('\n')||'(無)')+'</div>'
    +'<div class="dbg-title">收款表第1筆：</div><div class="dbg">'+JSON.stringify(payRows[0]||{},null,2)+'</div>';

  var validRows=purchRows.filter(function(r){return r[CASE_COL]&&r[CASE_COL].trim();});

  // ── 應收/應付事件（純應收付，不含ETD/ETA）──────────
  // 事件結構：{tag, name, amtStr, cur, rawAmt, date}
  var todayAP=[],todayAR=[],tmrAP=[],tmrAR=[],weekEvs=[];

  function parseCurAmt(amtStr){
    if(!amtStr)return{cur:'',rawAmt:0};
    var p=amtStr.trim().split(' ');
    return{cur:p[0]||'',rawAmt:parseFloat((p[1]||'').replace(/,/g,''))||0};
  }

  function addEv(tag,name,amtStr,cur,rawAmt,date){
    var ev={tag:tag,name:name,amtStr:amtStr,cur:cur,rawAmt:rawAmt,date:date};
    if(sameDay(date,T)){if(tag==='AP')todayAP.push(ev);else todayAR.push(ev);}
    if(sameDay(date,TM)){if(tag==='AP')tmrAP.push(ev);else tmrAR.push(ev);}
    if(inWeek(date,WK_MON,WK_SUN)&&!sameDay(date,T)&&!sameDay(date,TM))weekEvs.push(ev);
  }

  // 從採購/銷售表
  validRows.forEach(function(r){
    var cn=r[CASE_COL]||'';
    // AP（應付）= 採購款
    AP_DATES.forEach(function(dc,i){
      var d=parseDate(r[dc]);if(!d)return;
      var cur=r[AP_CURS[i]]||'';
      var rawAmt=parseFloat(String(r[AP_AMTS[i]]||'').replace(/,/g,''))||0;
      var amtStr=rawAmt>0?(cur+' '+fmtN(rawAmt)):'';
      addEv('AP',cn+'｜'+(r[AP_NAMES[i]]||'採購款'),amtStr,cur,rawAmt,d);
    });
    // AR（應收）= 銷售款
    AR_DATES.forEach(function(dc,i){
      var d=parseDate(r[dc]);if(!d)return;
      var cur=r[AR_CURS[i]]||'';
      var rawAmt=parseFloat(String(r[AR_AMTS[i]]||'').replace(/,/g,''))||0;
      var amtStr=rawAmt>0?(cur+' '+fmtN(rawAmt)):'';
      addEv('AR',cn+'｜'+(r[AR_NAMES[i]]||'銷售款'),amtStr,cur,rawAmt,d);
    });
  });

  // 從收款統計表
  // 判斷AP/AR：看「類別」欄（收/付）或「狀態」欄
  var PAY_DATE_COL=payFields.find(function(f){return f==='收款日';});
  var PAY_NOTE_COL=payFields.find(function(f){return f==='備註';});
  var PAY_CAT_COL =payFields.find(function(f){return f==='類別';});
  var PAY_STAT_COL=payFields.find(function(f){return f==='狀態';});
  dbg.push('\n收款表: 日期='+PAY_DATE_COL+' 備註='+PAY_NOTE_COL+' 類別='+PAY_CAT_COL+' 狀態='+PAY_STAT_COL);

  if(PAY_DATE_COL){
    payRows.forEach(function(r){
      var d=parseDate(r[PAY_DATE_COL]);if(!d)return;
      var name=(r[PAY_NOTE_COL]||'').trim();if(!name)return;
      // 幣別金額（取第一個有值的幣別）
      var cur='',rawAmt=0;
      PAY_CURS.forEach(function(c){
        if(cur)return;
        var v=r[c];if(!v)return;
        var n=parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.-]/g,''));
        if(!isNaN(n)&&n>0){cur=c;rawAmt=n;}
      });
      var amtStr=rawAmt>0?(cur+' '+fmtN(rawAmt)):'';
      // AP/AR 判斷
      var cat=(r[PAY_CAT_COL]||'').trim();
      var stat=(r[PAY_STAT_COL]||'').trim();
      var tag;
      if(cat==='付款'||cat==='付')tag='AP';
      else if(cat==='收款'||cat==='收')tag='AR';
      else if(stat.includes('付'))tag='AP';
      else tag='AR';
      addEv(tag,name,amtStr,cur,rawAmt,d);
    });
  }

  // ── 跑馬燈（今日+明日 AP/AR）──────────────────────
  var tickEvs=[].concat(
    todayAP.map(function(e){return{e:e,day:'today'};}),
    todayAR.map(function(e){return{e:e,day:'today'};}),
    tmrAP.map(function(e){return{e:e,day:'tmr'};}),
    tmrAR.map(function(e){return{e:e,day:'tmr'};})
  );
  var calTotal=todayAP.length+todayAR.length+tmrAP.length+tmrAR.length;
  var bCal=document.getElementById('b-cal');
  bCal.textContent=calTotal;bCal.className='badge '+(calTotal>0?'hot':'zero');

  document.getElementById('tickerTrack').innerHTML=tickEvs.length
    ?tickEvs.concat(tickEvs).map(function(t){
      return '<span class="ti"><span class="'+(t.day==='today'?'ti-today':'ti-tmr')+'">'+(t.day==='today'?'今日':'明日')+'</span>'
        +'<span class="ti-tag '+t.e.tag.toLowerCase()+'">'+(t.e.tag==='AP'?'應付':'應收')+'</span>'
        +'<span>'+t.e.name+'</span>'+(t.e.amtStr?'<span style="color:var(--text3);font-size:11px">'+t.e.amtStr+'</span>':'')+'</span>';
    }).join('')
    :'<span class="ti" style="color:var(--text3)">✅ 今明無應收付事件</span>';

  // ── 今日渲染 ──────────────────────────────────────
  function renderDayEvs(apArr,arArr){
    if(!apArr.length&&!arArr.length)return'<div class="empty">✅ 無應收付事件</div>';
    var h='';
    if(arArr.length){
      h+='<div style="font-size:11px;color:var(--green);font-weight:700;margin:4px 0 4px 2px;letter-spacing:.05em;">應收</div>';
      h+=arArr.map(function(e){return evHTML(e.tag,e.name,e.amtStr);}).join('');
    }
    if(apArr.length){
      h+='<div style="font-size:11px;color:var(--red);font-weight:700;margin:'+(arArr.length?'10px':'4px')+' 0 4px 2px;letter-spacing:.05em;">應付</div>';
      h+=apArr.map(function(e){return evHTML(e.tag,e.name,e.amtStr);}).join('');
    }
    return h;
  }
  document.getElementById('ev-today').innerHTML=renderDayEvs(todayAP,todayAR);
  document.getElementById('ev-tmr').innerHTML=renderDayEvs(tmrAP,tmrAR);

  // ── 本週 ZIP 渲染 ─────────────────────────────────
  weekEvs.sort(function(a,b){return a.date-b.date;});
  if(!weekEvs.length){
    document.getElementById('ev-week').innerHTML='<div class="empty">✅ 本週（今明除外）無應收付事件</div>';
  }else{
    // 按日期分組
    var groups={};
    weekEvs.forEach(function(e){
      var dk=fmt(e.date);
      if(!groups[dk])groups[dk]={date:e.date,evts:[]};
      groups[dk].evts.push(e);
    });
    var wkHTML=Object.values(groups).map(function(g){
      var dow=DAYS[g.date.getDay()];
      return mkWkRow(fmt(g.date)+' ('+dow+')',g.evts);
    }).join('');
    document.getElementById('ev-week').innerHTML=wkHTML;
  }

  // ── 採購/銷售核對 ─────────────────────────────────
  var unmapped=validRows.filter(function(r){var hp=hasPurch(r),hs=hasSale(r),tp=r[TYPE_COL]||'';return hp&&!hs&&(tp.includes('採購')||tp.includes('三角'));});
  var realUnmapped=unmapped.filter(function(r){return!annoMap[rowKey(r)];});
  var annotated=validRows.filter(function(r){return!!annoMap[rowKey(r)];});
  var bMap=document.getElementById('b-map');bMap.textContent=realUnmapped.length;bMap.className='badge '+(realUnmapped.length>0?'hot':'ok');
  var mb=document.getElementById('map-banner');mb.className='banner '+(realUnmapped.length>0?'warn':'good');
  mb.innerHTML=realUnmapped.length>0?'🔴 發現 <strong>'+realUnmapped.length+'</strong> 筆採購未對應到銷售':'✅ 所有採購均已對應到銷售';
  var DISP=[CASE_COL,BIZ_COL,SUP_COL,CUS_COL,TYPE_COL];
  function mkSel(key,cn,cur){
    var ek=key.replace(/\\/g,'\\\\').replace(/'/g,"\\'"),ec=cn.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var o=cur?''+'<option value="">— 選擇</option>':'';
    o+='<option value="stock" '+(cur==='stock'?'selected':'')+'>📦 庫存出貨</option>';
    o+='<option value="expense" '+(cur==='expense'?'selected':'')+'>💼 費用類</option>';
    if(cur)o+='<option value="">✕ 取消</option>';
    return '<select class="anno-sel" onchange="setAnnotation(\''+ek+'\',this.value,\''+ec+'\')">'+o+'</select>';
  }
  var mapHTML='';
  if(realUnmapped.length)mapHTML+='<div class="th"><div><div class="th-t">🔴 採購未對應銷售（'+realUnmapped.length+'筆）</div><div class="th-s">若為庫存出或費用類，請在右側標記</div></div></div><div class="tw"><table><thead><tr>'+DISP.map(function(c){return'<th>'+c+'</th>';}).join('')+'<th>採購期1日</th><th>狀態</th><th>標記</th></tr></thead><tbody>'+realUnmapped.map(function(r){var key=rowKey(r),cn=r[CASE_COL]||'';return'<tr>'+DISP.map(function(c){return'<td>'+(r[c]||'-')+'</td>';}).join('')+'<td style="font-family:\'JetBrains Mono\',monospace">'+fmt(parseDate(r['採購期1預計日']))+'</td><td><span class="pill warn">⚠️ 未對應</span></td><td>'+mkSel(key,cn,'')+'</td></tr>';}).join('')+'</tbody></table></div>';
  if(annotated.length)mapHTML+='<div class="th" style="margin-top:8px"><div><div class="th-t" style="color:var(--text2)">🏷️ 已標記案件（'+annotated.length+'筆）</div></div></div><div class="tw"><table><thead><tr>'+DISP.map(function(c){return'<th>'+c+'</th>';}).join('')+'<th>標記</th><th>修改</th></tr></thead><tbody>'+annotated.map(function(r){var key=rowKey(r),cn=r[CASE_COL]||'',anno=annoMap[key]||{},ti=ANNO_TYPES[anno.type||'']||ANNO_TYPES[''];return'<tr>'+DISP.map(function(c){return'<td>'+(r[c]||'-')+'</td>';}).join('')+'<td><span class="pill pend" style="color:'+ti.color+'">'+ti.label+'</span></td><td>'+mkSel(key,cn,anno.type||'')+'</td></tr>';}).join('')+'</tbody></table></div>';
  mapHTML+='<div class="th" style="margin-top:8px"><div><div class="th-t">📋 全部案件（'+validRows.length+'筆）</div></div><input class="srch" placeholder="搜尋案件/客戶/供應商..." oninput="ftbl(this.value,\'ftable\')"></div><div class="tw"><table id="ftable"><thead><tr>'+DISP.map(function(c){return'<th>'+c+'</th>';}).join('')+'<th>採購</th><th>銷售</th><th>ETD</th><th>ETA</th></tr></thead><tbody>'+validRows.map(function(r){var hp=hasPurch(r),hs=hasSale(r),anno=annoMap[rowKey(r)],etd=parseDate(r[ETD_COL]),eta=parseDate(r[ETA_COL]);var st;if(anno){var ti=ANNO_TYPES[anno.type||'']||ANNO_TYPES[''];st='<span class="pill pend" style="color:'+ti.color+'">'+ti.label+'</span>';}else if(hp&&hs)st='<span class="pill ok">✅ 完整</span>';else if(hp&&!hs)st='<span class="pill warn">⚠️ 無銷售</span>';else if(!hp&&hs)st='<span class="pill err">❌ 無採購</span>';else st='<span class="pill pend">待確認</span>';return'<tr>'+DISP.map(function(c){return'<td>'+(r[c]||'-')+'</td>';}).join('')+'<td><span class="pill '+(hp?'ok':'pend')+'">'+(hp?'✅':'—')+'</span></td><td>'+st+'</td><td style="font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(etd?fmt(etd):'-')+'</td><td style="font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(eta?fmt(eta):'-')+'</td></tr>';}).join('')+'</tbody></table></div>';
  document.getElementById('map-body').innerHTML=mapHTML;

  // ── ETD/ETA 追蹤 ──────────────────────────────────
  var ships=[];
  validRows.forEach(function(r){var name=r[CASE_COL]||'',sup=r[SUP_COL]||'',cust=r[CUS_COL]||'';var etd=parseDate(r[ETD_COL]);if(etd)ships.push({type:'ETD',date:etd,name:name,sup:sup,cust:cust});var eta=parseDate(r[ETA_COL]);if(eta)ships.push({type:'ETA',date:eta,name:name,sup:sup,cust:cust});});
  ships.sort(function(a,b){return a.date-b.date;});
  var now=getToday();
  var todayS=ships.filter(function(e){return sameDay(e.date,T);}),tmrS=ships.filter(function(e){return sameDay(e.date,TM);});
  var overdue=ships.filter(function(e){return e.date<now;}),upcoming=ships.filter(function(e){return e.date>=now;});
  var bShip=document.getElementById('b-ship');bShip.textContent=todayS.length+tmrS.length;bShip.className='badge '+((todayS.length+tmrS.length)>0?'hot':'zero');
  function tlHTML(evts){return evts.map(function(e){var cls=e.date<now?'over':e.type.toLowerCase();return'<div class="tli"><div class="tl-dt">'+fmt(e.date)+'</div><div class="tl-ln '+cls+'"></div><div class="tl-b"><div class="tl-n">'+e.name+'</div><div class="tl-m">['+e.type+']'+(e.sup?' 供應商: '+e.sup:'')+(e.cust?' ｜ 客戶: '+e.cust:'')+'</div></div></div>';}).join('');}
  var upETD=upcoming.filter(function(e){return e.type==='ETD';}),upETA=upcoming.filter(function(e){return e.type==='ETA';});
  var shipHTML='<div class="cg" style="margin-bottom:20px"><div class="card today"><div class="card-t">🚢 今日出入貨</div><div class="evl">'+(todayS.length?todayS.map(function(e){return evHTML(e.type,e.name,'');}).join(''):'<div class="empty">✅ 今日無出入貨</div>')+'</div></div><div class="card tmr"><div class="card-t">🚢 明日出入貨</div><div class="evl">'+(tmrS.length?tmrS.map(function(e){return evHTML(e.type,e.name,'');}).join(''):'<div class="empty">✅ 明日無出入貨</div>')+'</div></div></div>';
  if(overdue.length)shipHTML+='<div class="tls"><div class="tlh" style="color:var(--red)">⚠️ 逾期（'+overdue.length+'筆）</div>'+tlHTML(overdue)+'</div>';
  shipHTML+='<div class="tls"><div class="tlh" style="color:var(--blue)">📤 即將出貨 ETD（'+upETD.length+'筆）</div>'+(upETD.length?tlHTML(upETD):'<div class="empty">暫無</div>')+'</div>';
  shipHTML+='<div class="tls"><div class="tlh" style="color:var(--yellow)">📥 即將到貨 ETA（'+upETA.length+'筆）</div>'+(upETA.length?tlHTML(upETA):'<div class="empty">暫無</div>')+'</div>';
  document.getElementById('ship-body').innerHTML=shipHTML;

  var n=new Date();
  document.getElementById('rtime').textContent='最後更新 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

init();
setInterval(init,5*60*1000);
</script>
