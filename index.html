<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM 管理中心</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#656d76;--accent:#f0883e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:38px;position:sticky;top:0;z-index:100;display:flex;align-items:center;}
.ticker-pill{flex-shrink:0;background:var(--accent);color:#000;font-weight:700;font-size:11px;padding:3px 12px;margin-left:12px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.ticker-area{flex:1;overflow:hidden;height:100%;}
.ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll 60s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;padding:0 20px;border-right:1px solid var(--border);font-size:12px;font-family:'JetBrains Mono',monospace;}
.ti-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.ti-tag.ar{background:rgba(63,185,80,.2);color:var(--green);}
.ti-tag.ap{background:rgba(248,81,73,.2);color:var(--red);}
.ti-today{color:var(--accent);font-size:10px;}
.ti-tmr{color:var(--green);font-size:10px;}
.hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.hdr-t{font-size:18px;font-weight:700;}
.hdr-d{color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{border-color:var(--blue);}
.rtime{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace;}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;}
.tab{padding:11px 18px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--blue);}
.badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;min-width:18px;text-align:center;}
.badge.hot{background:var(--red);color:#fff;}
.badge.ok{background:var(--green);color:#000;}
.badge.zero{background:var(--bg3);color:var(--text3);}
.pane{display:none;padding:20px 24px;}
.pane.active{display:block;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.card.today{border-left:3px solid var(--accent);}
.card.tmr{border-left:3px solid var(--green);}
.card.week{border-left:3px solid var(--blue);}
.card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card.today .card-t{color:var(--accent);}
.card.tmr .card-t{color:var(--green);}
.card.week .card-t{color:var(--blue);}
.card-date{font-weight:400;font-size:11px;opacity:.65;font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none;}
.evl{display:flex;flex-direction:column;gap:5px;}
.ev{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg3);border-radius:6px;}
.ev-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;min-width:42px;text-align:center;}
.ev-tag.ar{background:rgba(63,185,80,.15);color:var(--green);}
.ev-tag.ap{background:rgba(248,81,73,.15);color:var(--red);}
.ev-tag.etd{background:rgba(88,166,255,.15);color:var(--blue);}
.ev-tag.eta{background:rgba(210,153,34,.15);color:var(--yellow);}
.ev-n{flex:1;font-size:13px;}
.ev-a{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;flex-shrink:0;}
.ev-a.ar{color:var(--green);}
.ev-a.ap{color:var(--red);}
.ev-sec-label{font-size:11px;font-weight:700;margin:8px 0 4px 2px;letter-spacing:.05em;}
.ev-sec-label.ar{color:var(--green);}
.ev-sec-label.ap{color:var(--red);}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:13px;}
/* 逾期 */
.od-group{margin-bottom:5px;}
.od-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;background:var(--bg3);border-radius:7px;cursor:pointer;user-select:none;transition:background .12s;}
.od-hdr:hover{background:#2a2020;}
.od-hdr-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.od-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;}
.od-label.ap{color:var(--red);}
.od-label.ar{color:var(--green);}
.od-amt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.od-cnt{font-size:10px;color:var(--text3);}
.od-arrow{color:var(--text3);font-size:10px;transition:transform .2s;}
.od-arrow.open{transform:rotate(90deg);}
.od-body{display:none;padding:4px 0 2px 12px;}
.od-body.open{display:flex;flex-direction:column;gap:3px;}
.od-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:rgba(248,81,73,.05);border-radius:5px;border-left:2px solid rgba(248,81,73,.3);}
.od-row.ar{background:rgba(63,185,80,.05);border-left-color:rgba(63,185,80,.3);}
.od-name{flex:1;font-size:12px;color:var(--text2);}
.od-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red);flex-shrink:0;}
.od-row.ar .od-date{color:var(--green);}
.od-damount{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);flex-shrink:0;}
/* 本週 ZIP */
.wk-group{margin-bottom:6px;}
.wk-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg3);border-radius:8px;cursor:pointer;user-select:none;transition:background .15s;}
.wk-hdr:hover{background:#252d3a;}
.wk-hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.wk-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);font-weight:600;flex-shrink:0;}
.wk-pills{display:flex;gap:5px;flex-wrap:wrap;}
.wk-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.wk-pill.ap{background:rgba(248,81,73,.15);color:var(--red);}
.wk-pill.ar{background:rgba(63,185,80,.15);color:var(--green);}
.wk-arrow{color:var(--text3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.wk-arrow.open{transform:rotate(180deg);}
.wk-body{display:none;}
.wk-body.open{display:flex;flex-direction:column;gap:4px;margin-top:5px;}
/* 幣別 sub-ZIP */
.cur-group{margin-bottom:3px;}
.cur-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg2);border-radius:6px;cursor:pointer;user-select:none;transition:background .12s;border-left:2px solid transparent;}
.cur-hdr.ap{border-left-color:rgba(248,81,73,.5);}
.cur-hdr.ar{border-left-color:rgba(63,185,80,.5);}
.cur-hdr:hover{background:#1d2535;}
.cur-hdr-left{display:flex;align-items:center;gap:8px;}
.cur-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;}
.cur-label.ap{color:var(--red);}
.cur-label.ar{color:var(--green);}
.cur-amt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.cur-arrow{color:var(--text3);font-size:10px;transition:transform .2s;}
.cur-arrow.open{transform:rotate(90deg);}
.cur-body{display:none;padding:4px 0 2px 14px;}
.cur-body.open{display:flex;flex-direction:column;gap:3px;}
.dept-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg3);border-radius:5px;}
.dept-name{flex:1;font-size:12px;color:var(--text2);}
.dept-amt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);flex-shrink:0;}
/* TABLE */
.banner{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:16px;line-height:1.6;}
.banner.warn{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);}
.banner.good{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);}
.banner.info{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);color:var(--blue);}
.th{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.th-t{font-size:14px;font-weight:600;}
.th-s{font-size:12px;color:var(--text3);margin-top:2px;}
.srch{padding:7px 13px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;width:210px;font-family:inherit;}
.srch:focus{outline:none;border-color:var(--blue);}
.srch::placeholder{color:var(--text3);}
.tw{border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg3);padding:9px 13px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 13px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.ok{background:rgba(63,185,80,.15);color:var(--green);}
.pill.warn{background:rgba(210,153,34,.15);color:var(--yellow);}
.pill.err{background:rgba(248,81,73,.15);color:var(--red);}
.pill.pend{background:rgba(88,166,255,.1);color:var(--blue);}
.anno-sel{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;}
.anno-sel:hover,.anno-sel:focus{outline:none;border-color:var(--yellow);}
/* TIMELINE */
.tls{margin-bottom:24px;}
.tlh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px;}
.tli{display:flex;align-items:stretch;margin-bottom:5px;}
.tl-dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);width:86px;flex-shrink:0;padding-top:10px;}
.tl-ln{width:2px;background:var(--border);margin:0 14px;flex-shrink:0;position:relative;}
.tl-ln::before{content:'';position:absolute;top:11px;left:-4px;width:10px;height:10px;border-radius:50%;}
.tl-ln.etd::before{background:var(--blue);}
.tl-ln.eta::before{background:var(--yellow);}
.tl-ln.over::before{background:var(--red);}
.tl-b{flex:1;padding:8px 12px;background:var(--bg3);border-radius:6px;}
.tl-n{font-size:13px;}
.tl-m{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}
/* 追蹤備註 */
.note-form{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.nf-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.nf-input{flex:1;min-width:140px;padding:7px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;}
.nf-input:focus{outline:none;border-color:var(--blue);}
.nf-input::placeholder{color:var(--text3);}
.nf-sel{padding:7px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;}
.nf-sel:focus{outline:none;border-color:var(--blue);}
.nf-ta{width:100%;padding:7px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:64px;}
.nf-ta:focus{outline:none;border-color:var(--blue);}
.nf-ta::placeholder{color:var(--text3);}
.nf-btn{padding:7px 18px;border-radius:6px;background:var(--blue);color:#000;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit;}
.nf-btn:hover{background:#79c0ff;}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;}
.note-card.etd{border-left:3px solid var(--blue);}
.note-card.eta{border-left:3px solid var(--yellow);}
.note-card.warn{border-left:3px solid var(--red);}
.note-card.note{border-left:3px solid var(--purple);}
.note-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.note-type{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.note-type.etd{background:rgba(88,166,255,.15);color:var(--blue);}
.note-type.eta{background:rgba(210,153,34,.15);color:var(--yellow);}
.note-type.warn{background:rgba(248,81,73,.15);color:var(--red);}
.note-type.note{background:rgba(188,140,255,.15);color:var(--purple);}
.note-case{font-size:13px;font-weight:600;flex:1;}
.note-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}
.note-del{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;}
.note-del:hover{color:var(--red);}
.note-body{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;}
.note-meta{font-size:11px;color:var(--text3);margin-top:5px;font-family:'JetBrains Mono',monospace;}
/* DBG */
.dbg{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:12px;white-space:pre-wrap;max-height:300px;overflow-y:auto;line-height:1.7;}
.dbg-title{font-size:13px;color:var(--text2);margin:12px 0 6px;font-weight:600;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ldg{display:flex;align-items:center;gap:12px;padding:24px;color:var(--text3);font-size:13px;}
@media(max-width:700px){.cg{grid-template-columns:1fr;}.hdr{flex-direction:column;gap:10px;align-items:flex-start;}}
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-pill">📅 今明提醒</div>
  <div class="ticker-area"><div class="ticker-track" id="tickerTrack">
    <span class="ti"><span style="color:var(--text3)">載入中...</span></span>
  </div></div>
</div>
<div class="hdr">
  <div><div class="hdr-t">📦 PM 管理中心</div><div class="hdr-d" id="hDate"></div></div>
  <div class="hdr-r"><span class="rtime" id="rtime"></span><button class="btn" onclick="init()">🔄 重新整理</button></div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-cal"  onclick="goTab('cal')">📅 行事曆提醒 <span class="badge zero" id="b-cal">0</span></div>
  <div class="tab"        id="tab-map"  onclick="goTab('map')">🔍 採購/銷售核對 <span class="badge zero" id="b-map">0</span></div>
  <div class="tab"        id="tab-ship" onclick="goTab('ship')">🚢 ETD/ETA 追蹤 <span class="badge zero" id="b-ship">0</span></div>
  <div class="tab"        id="tab-dbg"  onclick="goTab('dbg')">🔧 診斷</div>
</div>

<!-- 行事曆 -->
<div class="pane active" id="pane-cal">
  <div id="overdue-block" style="display:none;margin-bottom:16px;">
    <div class="card" style="border-left:3px solid var(--red);">
      <div class="card-t" style="color:var(--red);">⚠️ 逾期應收付 <span class="card-date" id="label-overdue"></span></div>
      <div id="ev-overdue"></div>
    </div>
  </div>
  <div class="cg">
    <div class="card today">
      <div class="card-t">🔴 今日應收付 <span class="card-date" id="label-today"></span></div>
      <div class="evl" id="ev-today"><div class="ldg"><div class="spin"></div>載入中...</div></div>
    </div>
    <div class="card tmr">
      <div class="card-t">🟡 明日應收付 <span class="card-date" id="label-tmr"></span></div>
      <div class="evl" id="ev-tmr"><div class="ldg"><div class="spin"></div>載入中...</div></div>
    </div>
  </div>
  <div class="card week" style="margin-bottom:16px;">
    <div class="card-t">📆 本週應收付 <span class="card-date" id="label-week"></span></div>
    <div id="ev-week"><div class="ldg"><div class="spin"></div>載入中...</div></div>
  </div>
  <div class="card" style="border-left:3px solid var(--purple);">
    <div class="card-t" style="color:var(--purple);">🗓️ 下週應收付 <span class="card-date" id="label-nxtwk"></span></div>
    <div id="ev-nxtwk"><div class="ldg"><div class="spin"></div>載入中...</div></div>
  </div>
</div>

<!-- 採購/銷售核對 -->
<div class="pane" id="pane-map">
  <div id="map-banner" class="banner info">🔄 載入中...</div>
  <div id="map-body"></div>
</div>

<!-- ETD/ETA + 追蹤備註 -->
<div class="pane" id="pane-ship">
  <!-- 追蹤備註 -->
  <div style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:14px;font-weight:700;">📝 ETD/ETA 追蹤備註</div>
      <button class="btn" onclick="toggleNoteForm()" id="nf-toggle" style="font-size:12px;padding:4px 12px;">展開 ▼</button>
    </div>
    <div id="nf-wrap" style="display:none;">
      <div class="note-form">
        <div class="nf-row">
          <input class="nf-input" id="nf-case" placeholder="案件名稱 *"/>
          <input class="nf-input" id="nf-author" placeholder="回報人 *" style="max-width:130px;"/>
        </div>
        <div class="nf-row" style="align-items:center;">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:160px;">
            <span style="font-size:12px;color:var(--text3);white-space:nowrap;font-weight:600;">📤 ETD</span>
            <input class="nf-input" id="nf-etd" type="date"/>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:160px;">
            <span style="font-size:12px;color:var(--text3);white-space:nowrap;font-weight:600;">📥 ETA</span>
            <input class="nf-input" id="nf-eta" type="date"/>
          </div>
          <span style="font-size:11px;color:var(--text3);white-space:nowrap;">擇一或都填</span>
        </div>
        <div style="margin-bottom:10px;">
          <textarea class="nf-ta" id="nf-note" placeholder="備註（選填，例如：重量、港口、說明...）" style="min-height:48px;"></textarea>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <button class="nf-btn" onclick="submitNote()">✅ 儲存</button>
          <button class="btn" onclick="testApi()" style="font-size:12px;padding:5px 12px;">🔧 測試連線</button>
          <span id="nf-status" style="font-size:12px;color:var(--text3);"></span>
        </div>
      </div>
    </div>
    <div id="notes-list"><div class="ldg"><div class="spin"></div>載入備註...</div></div>
  </div>
  <div style="border-top:1px solid var(--border);margin-bottom:20px;"></div>
  <div id="ship-body"><div class="ldg"><div class="spin"></div>載入中...</div></div>
</div>

<!-- 診斷 -->
<div class="pane" id="pane-dbg">

// ══ 日期工具 ═══════════════════════════════════════
function getToday(){var d=new Date();d.setHours(0,0,0,0);return d;}
function getTomorrow(){var d=getToday();d.setDate(d.getDate()+1);return d;}
function parseDate(v){
  if(!v)return null;
  var s=String(v).trim();if(!s)return null;
  var dp=s.split(' ')[0].replace(/\//g,'-');
  var p=dp.split('-');
  if(p.length===3){
    var d=new Date(p[0].padStart(4,'0')+'-'+p[1].padStart(2,'0')+'-'+p[2].padStart(2,'0')+'T00:00:00');
    return isNaN(d.getTime())?null:d;
  }
  return null;
}
function sameDay(a,b){if(!a||!b)return false;return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmt(d){if(!d)return '-';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtN(n){return Math.round(n).toLocaleString('en-US');}
function getWeekRange(base){
  var d=new Date(base),day=d.getDay();
  var mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return{mon:mon,sun:sun};
}
function getNextWeekRange(base){var nx=new Date(base);nx.setDate(nx.getDate()+7);return getWeekRange(nx);}
function inWeek(d,mon,sun){return d>=mon&&d<=sun;}

// ══ CSV ════════════════════════════════════════════
function fetchCSV(id,gid,skip){
  if(skip===undefined)skip=0;
  return new Promise(function(resolve,reject){
    Papa.parse('https://docs.google.com/spreadsheets/d/'+id+'/export?format=csv&gid='+gid+'&t='+Date.now(),{
      download:true,header:false,skipEmptyLines:false,
      complete:function(r){
        var all=r.data;if(!all.length){resolve({fields:[],rows:[]});return;}
        var h=all[skip]||[];
        var rows=all.slice(skip+1).map(function(row){
          var o={};h.forEach(function(k,i){o[k]=String(row[i]!==undefined?row[i]:'').trim();});return o;
        });
        resolve({fields:h,rows:rows});
      },
      error:function(e){reject(e);}
    });
  });
}
function fetchAnnotations(){
  return new Promise(function(resolve){
    // 優先從 Apps Script API 讀取（即時）
    if(ANNO_API_URL){
      fetch(ANNO_API_URL+'?action=getall&t='+Date.now())
        .then(function(r){return r.json();})
        .then(function(json){
          if(json.status==='ok'&&json.data){resolve(json.data);}
          else{resolve({});}
        }).catch(function(){resolve({});});
      return;
    }
    // fallback：從原本的 ANNO_SHEET_ID CSV 讀
    fetch('https://docs.google.com/spreadsheets/d/'+ANNO_SHEET_ID+'/export?format=csv&gid='+ANNO_GID+'&t='+Date.now())
      .then(function(r){return r.text();})
      .then(function(txt){
        var m={};
        txt.split('\n').forEach(function(l,i){
          if(i===0)return;
          var c=l.split(',');
          var k=(c[0]||'').replace(/"/g,'').trim();
          var t=(c[1]||'').replace(/"/g,'').trim();
          if(k)m[k]={type:t};
        });
        resolve(m);
      }).catch(function(){resolve({});});
  });
}

// ══ 解析統計表一列 ══════════════════════════════════
function parseStatRow(r,tag,datecol){
  var d=parseDate(r[datecol]);if(!d)return null;
  var name=(r[NOTE_COL]||r[CAT_COL]||r[DEPT_COL]||'').trim();if(!name)return null;
  var amtMap={};
  CUR_COLS.forEach(function(cur){
    var raw=String(r[cur]||'').trim();if(!raw)return;
    var n=parseFloat(raw.replace(/[^0-9.]/g,''));
    if(!isNaN(n)&&n>0)amtMap[cur]=n;
  });
  var amtStr=Object.keys(amtMap).map(function(c){return c+' '+fmtN(amtMap[c]);}).join(' / ');
  var dept=(r[DEPT_COL]||'').trim();
  return{tag:tag,name:name,dept:dept,amtStr:amtStr,amtMap:amtMap,date:d};
}

function mkOdZip(evts,tag){
  var byC={};
  evts.forEach(function(e){
    var curs=Object.keys(e.amtMap);
    var key=curs.length?curs[0]:'X';
    if(!byC[key])byC[key]=[];
    byC[key].push(e);
  });
  var tgL=tag==='AP'?'應付':'應收';
  var html='';
  Object.keys(byC).forEach(function(cur,ci){
    var cEvts=byC[cur];
    var total=cur==='X'?0:cEvts.reduce(function(s,e){return s+(e.amtMap[cur]||0);},0);
    var id='od'+tag+cur+ci;
    var rows=cEvts.map(function(e){
      var da=cur==='X'?e.amtStr:(e.amtMap[cur]?cur+' '+fmtN(e.amtMap[cur]):'');
      return '<div class="od-row '+(tag==='AR'?'ar':'')+'">'
        +'<span class="od-name">'+(e.name||'')+'</span>'
        +'<span class="od-date">'+fmt(e.date)+'</span>'
        +(da?'<span class="od-damount">'+da+'</span>':'')
        +'</div>';
    }).join('');
    html+='<div class="od-group"><div class="od-hdr" onclick="toggleOd(\''+id+'\')">'
      +'<div class="od-hdr-left"><span class="od-label '+tag.toLowerCase()+'">'+tgL+(cur!=='X'?' '+cur:'')+'</span>'
      +(total>0?'<span class="od-amt">'+fmtN(total)+'</span>':'')
      +'<span class="od-cnt">'+cEvts.length+'筆</span></div>'
      +'<span class="od-arrow" id="oarr-'+id+'">▶</span></div>'
      +'<div class="od-body" id="'+id+'">'+rows+'</div></div>';
  });
  return html;
}

function mkWkRow(dateLabel,evts){
  var apSum={},arSum={};
  evts.forEach(function(e){
    var s=e.tag==='AP'?apSum:arSum;
    Object.keys(e.amtMap).forEach(function(c){if(!s[c])s[c]=0;s[c]+=e.amtMap[c];});
  });
  var pills='';
  Object.keys(apSum).forEach(function(c){pills+='<span class="wk-pill ap">應付 '+c+' '+fmtN(apSum[c])+'</span>';});
  Object.keys(arSum).forEach(function(c){pills+='<span class="wk-pill ar">應收 '+c+' '+fmtN(arSum[c])+'</span>';});
  if(!pills)pills='<span style="font-size:11px;color:var(--text3)">—</span>';

  // 第2層：tag+幣別分組
  var grp={AP:{},AR:{}};
  evts.forEach(function(e){
    var curs=Object.keys(e.amtMap);
    if(!curs.length){
      var nk='Z';
      if(!grp[e.tag][nk])grp[e.tag][nk]=[];
      grp[e.tag][nk].push(e);
    } else {
      curs.forEach(function(cur){
        if(!grp[e.tag][cur])grp[e.tag][cur]=[];
        grp[e.tag][cur].push(e);
      });
    }
  });

  var wkId='wk'+dateLabel.replace(/[^0-9]/g,'');
  var curHTML='';
  ['AP','AR'].forEach(function(tg){
    var tgL=tg==='AP'?'應付':'應收';
    Object.keys(grp[tg]).forEach(function(cur,ci){
      var cEvts=grp[tg][cur];
      var total=cur==='Z'?0:cEvts.reduce(function(s,e){return s+(e.amtMap[cur]||0);},0);
      var cId=wkId+'_'+tg+'_'+cur+'_'+ci;
      var deptHTML=cEvts.map(function(e){
        var da=cur==='Z'?e.amtStr:(e.amtMap[cur]?cur+' '+fmtN(e.amtMap[cur]):'');
        return '<div class="dept-row"><span class="dept-name">'+(e.name||'')+'</span>'
          +(da?'<span class="dept-amt">'+da+'</span>':'')+'</div>';
      }).join('');
      curHTML+='<div class="cur-group"><div class="cur-hdr '+tg.toLowerCase()+'" onclick="toggleWk(\''+cId+'\')">'
        +'<div class="cur-hdr-left"><span class="cur-label '+tg.toLowerCase()+'">'+tgL+(cur!=='Z'?' '+cur:'')+'</span>'
        +(total>0?'<span class="cur-amt">'+fmtN(total)+'</span>':'')
        +'<span style="font-size:10px;color:var(--text3)">'+cEvts.length+'筆</span>'
        +'</div><span class="cur-arrow" id="arr-'+cId+'">▶</span></div>'
        +'<div class="cur-body" id="'+cId+'">'+deptHTML+'</div></div>';
    });
  });

  return '<div class="wk-group"><div class="wk-hdr" onclick="toggleWk(\''+wkId+'\')">'
    +'<div class="wk-hdr-left"><span class="wk-date">'+dateLabel+'</span><div class="wk-pills">'+pills+'</div></div>'
    +'<span class="wk-arrow" id="arr-'+wkId+'">▼</span></div>'
    +'<div class="wk-body" id="'+wkId+'">'+curHTML+'</div></div>';
}

// ══ 標記面板 ════════════════════════════════════════
async function setAnnotation(key,type,cn){
  // 立即更新 sessionStorage 讓 UI 即時反應
  var sa;try{sa=JSON.parse(sessionStorage.getItem('pm_anno')||'{}');}catch(e){sa={};}
  if(type){sa[key]={type:type};}else{delete sa[key];}
  try{sessionStorage.setItem('pm_anno',JSON.stringify(sa));}catch(e){}
  init(); // 先讓畫面即時更新

  // 回寫到 Google Sheet
  if(ANNO_API_URL){
    try{
      var params=new URLSearchParams({
        action:'set',
        key:encodeURIComponent(key),
        type:type||'',
        caseName:encodeURIComponent(cn||'')
      });
      var res=await fetch(ANNO_API_URL+'?'+params.toString());
      var json=await res.json();
      if(json.status!=='ok') console.warn('標記回寫失敗:',json.message);
    }catch(e){ console.warn('標記回寫失敗:',e); }
  } else {
    // 尚未設定 API URL，顯示提示
    showAnnoPanel(key,type,cn);
  }
}

  var p=document.getElementById('anno-panel');

  var ti=ANNO_TYPES[type||'']||ANNO_TYPES[''];

  p.innerHTML='';

  var ts=document.createElement('span');ts.style.cssText='font-weight:700;color:var(--text)';ts.textContent=type?(ti.label+' 已標記'):'已取消標記';
  var cb=document.createElement('button');cb.textContent='✕';cb.style.cssText='background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer';cb.onclick=function(){p.style.display='none';};
  hdr.appendChild(ts);hdr.appendChild(cb);p.appendChild(hdr);
  var cd=document.createElement('div');cd.style.cssText='color:var(--text2);margin-bottom:10px;font-size:12px';cd.innerHTML='案件：<strong style="color:var(--text)">'+cn+'</strong>';p.appendChild(cd);
  var box=document.createElement('div');box.style.cssText='background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:12px';
  var ht=document.createElement('div');ht.style.cssText='color:var(--text3);font-size:11px;margin-bottom:6px';ht.textContent='📋 複製以下資料貼到 Google Sheet 新列（A欄）：';box.appendChild(ht);
  var code=document.createElement('code');code.style.cssText="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);word-break:break-all;display:block";code.textContent=rowText;box.appendChild(code);
  var cpb=document.createElement('button');cpb.className='btn';cpb.style.cssText='margin-top:8px;font-size:12px;padding:4px 12px';cpb.textContent='📋 複製';
  cpb.onclick=function(){navigator.clipboard.writeText(rowText);cpb.textContent='✅ 已複製!';setTimeout(function(){cpb.textContent='📋 複製';},1500);};
  box.appendChild(cpb);p.appendChild(box);

async function loadNotes(){
  var el=document.getElementById('notes-list');
  if(!el)return;
  el.innerHTML='<div class="ldg"><div class="spin"></div>載入備註...</div>';
  try{
    var url='https://docs.google.com/spreadsheets/d/'+NOTES_SHEET_ID+'/export?format=csv&gid='+NOTES_GID+'&t='+Date.now();
    var res=await fetch(url);
    if(!res.ok)throw new Error('無法讀取（請確認 Sheet 已設為公開可檢視）');
    var txt=await res.text();
    var notes=[];
    txt.split('\n').forEach(function(line,i){
      if(i===0||!line.trim())return;
      // 簡單 CSV 解析
      var cols=[];var cur='';var inQ=false;
      for(var j=0;j<line.length;j++){
        var ch=line[j];
        if(ch==='"'){inQ=!inQ;}
        else if(ch===','&&!inQ){cols.push(cur.replace(/^"|"$/g,'').trim());cur='';}
        else cur+=ch;
      }
      cols.push(cur.replace(/^"|"$/g,'').trim());
      if(cols[0]||cols[1])notes.push({
        id:cols[0]||'',caseName:cols[1]||'',type:cols[2]||'note',
        date:cols[3]||'',content:cols[4]||'',author:cols[5]||'',createdAt:cols[6]||''
      });
    });
    notes.reverse();
    renderNotesList(notes);
  }catch(e){
    el.innerHTML='<div class="empty" style="color:var(--text3)">⚠️ '+e.message+'</div>';
  }
}

function renderNotesList(notes){
  var el=document.getElementById('notes-list');
  if(!el)return;
  var TYPE_ICON={note:'📌',etd:'📤',eta:'📥',warn:'⚠️'};
  var html='<div style="font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;margin-bottom:8px">共 '+notes.length+' 筆追蹤備註</div>';
  html+=notes.map(function(n){
    var tc=n.type||'note';
    var ic=TYPE_ICON[tc]||'📌';
    return '<div class="note-card '+tc+'">'
      +'<div class="note-hdr">'
      +'<span class="note-type '+tc+'">'+ic+' '+tc.toUpperCase()+'</span>'
      +'<span class="note-case">'+(n.caseName||'')+'</span>'
      +(n.date?'<span class="note-date">'+n.date+'</span>':'')
      +'<button class="note-del" onclick="deleteNote(\''+n.id+'\')">✕</button>'
      +'</div>'
      +'<div class="note-body">'+(n.content||'')+'</div>'
      +'<div class="note-meta">'+(n.author?'👤 '+n.author+' ':'')+(n.createdAt?'· '+n.createdAt:'')+'</div>'
      +'</div>';
  }).join('');
  el.innerHTML=html;
}

async function submitNote(){
  var caseName=(document.getElementById('nf-case').value||'').trim();
  var author=(document.getElementById('nf-author').value||'').trim();
  var etd=document.getElementById('nf-etd').value;
  var eta=document.getElementById('nf-eta').value;
  var note=(document.getElementById('nf-note').value||'').trim();
  var supplier=''; var customer=''; var portFrom=''; var portTo='';
  var status=document.getElementById('nf-status');
  if(!caseName||!author||(!etd&&!eta)){
    status.style.color='var(--red)';status.textContent='⚠️ 請填寫案件名稱、回報人，並至少填入 ETD 或 ETA';return;
  }
  if(!APPS_SCRIPT_URL){
    // 若尚未設定 Web App，改為引導使用者手動貼
    var id='N'+Date.now();
    var now=new Date().toLocaleString('zh-TW');
    var row=[id,caseName,type,date,content.replace(/\n/g,' '),author,now].join('\t');
    navigator.clipboard.writeText(row).catch(function(){});
    status.style.color='var(--yellow)';
    status.textContent='⚠️ 尚未設定 Apps Script，請手動貼到 Sheet（已複製到剪貼簿）';
    // 開啟 Sheet
    window.open('https://docs.google.com/spreadsheets/d/'+NOTES_SHEET_ID+'/edit','_blank');
    return;
  }
  // 先測試連線
  status.style.color='var(--text3)';status.textContent='連線測試中...';
  try{
    var testRes=await fetch(APPS_SCRIPT_URL+'?action=ping');
    var testJson=await testRes.json();
    if(testJson.status!=='ok'){throw new Error('API 回應異常：'+JSON.stringify(testJson));}
  }catch(te){
    status.style.color='var(--red)';
    status.textContent='❌ 連線失敗：'+te.message+' — 請確認 Apps Script 已重新部署且權限為「所有人」';
    return;
  }
  status.style.color='var(--text3)';status.textContent='儲存中...';
  var id='N'+Date.now();
  var now=new Date().toLocaleString('zh-TW');
  try{
    var params=new URLSearchParams({
      action:'add',id:id,
      caseName:encodeURIComponent(caseName),
      supplier:encodeURIComponent(supplier),
      customer:encodeURIComponent(customer),
      etd:etd,eta:eta,
      portFrom:encodeURIComponent(portFrom),
      portTo:encodeURIComponent(portTo),
      note:encodeURIComponent(note),
      author:encodeURIComponent(author),
      createdAt:encodeURIComponent(now)
    });
    var res=await fetch(APPS_SCRIPT_URL+'?'+params.toString());
    var json=await res.json();
    if(json.status!=='ok')throw new Error(json.message||'寫入失敗');
    status.style.color='var(--green)';status.textContent='✅ 已儲存！';
    document.getElementById('nf-case').value='';
    document.getElementById('nf-etd').value='';
    document.getElementById('nf-eta').value='';
    document.getElementById('nf-note').value='';
    setTimeout(function(){status.textContent='';},3000);
    await loadNotes();
  }catch(e){
    status.style.color='var(--red)';status.textContent='❌ '+e.message;
  }
}

async function deleteNote(id){
  if(!confirm('確定刪除這筆備註？'))return;
  if(!APPS_SCRIPT_URL){alert('請先設定 Apps Script Web App URL 才能刪除');return;}
  try{
    var params=new URLSearchParams({action:'delete',id:id});
    var res=await fetch(APPS_SCRIPT_URL+'?'+params.toString());
    var json=await res.json();
    if(json.status!=='ok')throw new Error(json.message||'刪除失敗');
    await loadNotes();
  }catch(e){alert('刪除失敗：'+e.message);}
}

// ══ 主邏輯 ═════════════════════════════════════════
async function init(){
  var T=getToday(),TM=getTomorrow();
  var wk=getWeekRange(T),WK_MON=wk.mon,WK_SUN=wk.sun;
  var nwk=getNextWeekRange(T),NWK_MON=nwk.mon,NWK_SUN=nwk.sun;
  var DAYS=['日','一','二','三','四','五','六'];

  document.getElementById('hDate').textContent=fmt(T)+' （今日）';
  document.getElementById('label-today').textContent=fmt(T);
  document.getElementById('label-tmr').textContent=fmt(TM);
  document.getElementById('label-week').textContent=fmt(WK_MON)+' ～ '+fmt(WK_SUN);
  document.getElementById('label-nxtwk').textContent=fmt(NWK_MON)+' ～ '+fmt(NWK_SUN);
  document.getElementById('rtime').textContent='更新中...';

  var dbg=[];

  // 讀取應收
  var arRows=[],arFields=[];
  try{var r1=await fetchCSV(ID_AR,GID_AR,SKIP_ROWS);arFields=r1.fields;arRows=r1.rows;dbg.push('[應收] ✅ '+arRows.length+'列 欄位：'+arFields.slice(0,8).join('|'));}
  catch(e){dbg.push('[應收] ❌ '+e);}

  // 讀取應付
  var apRows=[],apFields=[];
  try{var r2=await fetchCSV(ID_AP,GID_AP,SKIP_ROWS);apFields=r2.fields;apRows=r2.rows;dbg.push('[應付] ✅ '+apRows.length+'列 欄位：'+apFields.slice(0,8).join('|'));}
  catch(e){dbg.push('[應付] ❌ '+e);}

  // 讀取採購/銷售
  var purchRows=[],purchFields=[];
  try{var r3=await fetchCSV(ID_PURCH,GID_PURCH,0);purchFields=r3.fields;purchRows=r3.rows;dbg.push('[採購] ✅ '+purchRows.length+'列');}
  catch(e){dbg.push('[採購] ❌ '+e);}

  // 標記（Sheet 資料 + sessionStorage 即時覆蓋）
  var sheetAnno=await fetchAnnotations();
  var sessionAnno;try{sessionAnno=JSON.parse(sessionStorage.getItem('pm_anno')||'{}');}catch(e){sessionAnno={};}
  var annoMap=Object.assign({},sheetAnno,sessionAnno);
  // 若 API URL 已設定，清除 sessionStorage（避免過期資料殘留）
  if(ANNO_API_URL){
    try{sessionStorage.removeItem('pm_anno');}catch(e){}
  }

  // 診斷
  document.getElementById('dbg-body').innerHTML=
    '<div class="dbg">'+dbg.join('\n')+'</div>'
    +'<div class="dbg-title">應收欄位：</div><div class="dbg">'+(arFields.join(' | ')||'(無)')+'</div>'
    +'<div class="dbg-title">應收第1筆：</div><div class="dbg">'+JSON.stringify(arRows[0]||{},null,2)+'</div>'
    +'<div class="dbg-title">應付欄位：</div><div class="dbg">'+(apFields.join(' | ')||'(無)')+'</div>'
    +'<div class="dbg-title">應付第1筆：</div><div class="dbg">'+JSON.stringify(apRows[0]||{},null,2)+'</div>';

  var validRows=purchRows.filter(function(r){return r[CASE_COL]&&r[CASE_COL].trim();});

  // 收集 AR/AP 事件
  var todayAR=[],tmrAR=[],weekAR=[],nxtwkAR=[],overdueAR=[];
  arRows.forEach(function(r){
    var ev=parseStatRow(r,'AR',DATE_COL_AR);if(!ev)return;
    if(ev.date<T&&!sameDay(ev.date,T))overdueAR.push(ev);
    else if(sameDay(ev.date,T))todayAR.push(ev);
    else if(sameDay(ev.date,TM))tmrAR.push(ev);
    else if(inWeek(ev.date,WK_MON,WK_SUN))weekAR.push(ev);
    else if(inWeek(ev.date,NWK_MON,NWK_SUN))nxtwkAR.push(ev);
  });

  var todayAP=[],tmrAP=[],weekAP=[],nxtwkAP=[],overdueAP=[];
  apRows.forEach(function(r){
    var ev=parseStatRow(r,'AP',DATE_COL_AP);if(!ev)return;
    if(ev.date<T&&!sameDay(ev.date,T))overdueAP.push(ev);
    else if(sameDay(ev.date,T))todayAP.push(ev);
    else if(sameDay(ev.date,TM))tmrAP.push(ev);
    else if(inWeek(ev.date,WK_MON,WK_SUN))weekAP.push(ev);
    else if(inWeek(ev.date,NWK_MON,NWK_SUN))nxtwkAP.push(ev);
  });

  // 跑馬燈
  var tickEvs=[].concat(
    todayAR.map(function(e){return{e:e,day:'today'};}),
    todayAP.map(function(e){return{e:e,day:'today'};}),
    tmrAR.map(function(e){return{e:e,day:'tmr'};}),
    tmrAP.map(function(e){return{e:e,day:'tmr'};})
  );
  var calTotal=todayAR.length+todayAP.length+tmrAR.length+tmrAP.length;
  var bCal=document.getElementById('b-cal');
  bCal.textContent=calTotal;bCal.className='badge '+(calTotal>0?'hot':'zero');
  document.getElementById('tickerTrack').innerHTML=tickEvs.length
    ?tickEvs.concat(tickEvs).map(function(t){
      return '<span class="ti"><span class="'+(t.day==='today'?'ti-today':'ti-tmr')+'">'+(t.day==='today'?'今日':'明日')+'</span>'
        +'<span class="ti-tag '+t.e.tag.toLowerCase()+'">'+(t.e.tag==='AP'?'應付':'應收')+'</span>'
        +'<span>'+t.e.name+'</span>'+(t.e.amtStr?'<span style="color:var(--text3);font-size:11px;margin-left:4px">'+t.e.amtStr+'</span>':'')+'</span>';
    }).join('')
    :'<span class="ti" style="color:var(--text3)">✅ 今明無應收付事件</span>';

  // 逾期
  var odBlock=document.getElementById('overdue-block');
  if(overdueAR.length||overdueAP.length){
    odBlock.style.display='block';
    document.getElementById('label-overdue').textContent=(overdueAR.length+overdueAP.length)+'筆';
    var odHTML='';
    if(overdueAR.length)odHTML+=mkOdZip(overdueAR,'AR');
    if(overdueAP.length)odHTML+=mkOdZip(overdueAP,'AP');
    document.getElementById('ev-overdue').innerHTML=odHTML;
  }else{
    odBlock.style.display='none';
  }

  // 今日/明日
  document.getElementById('ev-today').innerHTML=renderDay(todayAP,todayAR);
  document.getElementById('ev-tmr').innerHTML=renderDay(tmrAP,tmrAR);

  // 本週
  function renderWk(arArr,apArr,elId,emptyMsg){
    var evts=[].concat(arArr,apArr);
    evts.sort(function(a,b){return a.date-b.date;});
    if(!evts.length){document.getElementById(elId).innerHTML='<div class="empty">'+emptyMsg+'</div>';return;}
    var groups={};
    evts.forEach(function(e){var dk=fmt(e.date);if(!groups[dk])groups[dk]={date:e.date,evts:[]};groups[dk].evts.push(e);});
    document.getElementById(elId).innerHTML=Object.values(groups).map(function(g){
      return mkWkRow(fmt(g.date)+' ('+DAYS[g.date.getDay()]+')',g.evts);
    }).join('');
  }
  renderWk(weekAR,weekAP,'ev-week','✅ 本週（今明除外）無應收付事件');
  renderWk(nxtwkAR,nxtwkAP,'ev-nxtwk','✅ 下週無應收付事件');

  // 採購/銷售核對
  var unmapped=validRows.filter(function(r){var hp=hasPurch(r),hs=hasSale(r),tp=r[TYPE_COL]||'';return hp&&!hs&&(tp.includes('採購')||tp.includes('三角'));});
  var realUnmapped=unmapped.filter(function(r){return!annoMap[rowKey(r)];});
  var annotated=validRows.filter(function(r){return!!annoMap[rowKey(r)];});
  var bMap=document.getElementById('b-map');bMap.textContent=realUnmapped.length;bMap.className='badge '+(realUnmapped.length>0?'hot':'ok');
  var mb=document.getElementById('map-banner');mb.className='banner '+(realUnmapped.length>0?'warn':'good');
  mb.innerHTML=realUnmapped.length>0?'🔴 發現 <strong>'+realUnmapped.length+'</strong> 筆採購未對應到銷售':'✅ 所有採購均已對應到銷售';
  var DISP=[CASE_COL,BIZ_COL,SUP_COL,CUS_COL,TYPE_COL];
  function mkSel(key,cn,cur){
    var ek=key.replace(/\\/g,'\\\\').replace(/'/g,"\\'"),ec=cn.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var o='<option value="">— 選擇</option>';
    o+='<option value="stock" '+(cur==='stock'?'selected':'')+'>📦 庫存出貨</option>';
    o+='<option value="expense" '+(cur==='expense'?'selected':'')+'>💼 費用類</option>';
    if(cur)o+='<option value="">✕ 取消</option>';
    return '<select class="anno-sel" onchange="setAnnotation(\''+ek+'\',this.value,\''+ec+'\')">'+o+'</select>';
  }
  var mapHTML='';
  if(realUnmapped.length){
    mapHTML+='<div class="th"><div><div class="th-t">🔴 採購未對應銷售（'+realUnmapped.length+'筆）</div><div class="th-s">若為庫存出或費用類，請在右側標記</div></div></div>'
      +'<div class="tw"><table><thead><tr>'+DISP.map(function(c){return'<th>'+c+'</th>';}).join('')+'<th>採購期1日</th><th>狀態</th><th>標記</th></tr></thead><tbody>'
      +realUnmapped.map(function(r){var key=rowKey(r),cn=r[CASE_COL]||'';return'<tr>'+DISP.map(function(c){return'<td>'+(r[c]||'-')+'</td>';}).join('')
        +'<td style="font-family:\'JetBrains Mono\',monospace">'+fmt(parseDate(r['採購期1預計日']))+'</td><td><span class="pill warn">⚠️ 未對應</span></td><td>'+mkSel(key,cn,'')+'</td></tr>';}).join('')
      +'</tbody></table></div>';
  }
  if(annotated.length){
    mapHTML+='<div class="th" style="margin-top:8px"><div><div class="th-t" style="color:var(--text2)">🏷️ 已標記（'+annotated.length+'筆）</div></div></div>'
      +'<div class="tw"><table><thead><tr>'+DISP.map(function(c){return'<th>'+c+'</th>';}).join('')+'<th>標記</th><th>修改</th></tr></thead><tbody>'
      +annotated.map(function(r){var key=rowKey(r),cn=r[CASE_COL]||'',anno=annoMap[key]||{},ti=ANNO_TYPES[anno.type||'']||ANNO_TYPES[''];
        return'<tr>'+DISP.map(function(c){return'<td>'+(r[c]||'-')+'</td>';}).join('')
          +'<td><span class="pill pend" style="color:'+ti.color+'">'+ti.label+'</span></td><td>'+mkSel(key,cn,anno.type||'')+'</td></tr>';}).join('')
      +'</tbody></table></div>';
  }
  mapHTML+='<div class="th" style="margin-top:8px"><div><div class="th-t">📋 全部案件（'+validRows.length+'筆）</div></div>'
    +'<input class="srch" placeholder="搜尋案件/客戶/供應商..." oninput="ftbl(this.value,\'ftable\')"></div>'
    +'<div class="tw"><table id="ftable"><thead><tr>'+DISP.map(function(c){return'<th>'+c+'</th>';}).join('')+'<th>採購</th><th>銷售</th><th>ETD</th><th>ETA</th></tr></thead><tbody>'
    +validRows.map(function(r){
      var hp=hasPurch(r),hs=hasSale(r),anno=annoMap[rowKey(r)],etd=parseDate(r[ETD_COL]),eta=parseDate(r[ETA_COL]);
      var st;
      if(anno){var ti=ANNO_TYPES[anno.type||'']||ANNO_TYPES[''];st='<span class="pill pend" style="color:'+ti.color+'">'+ti.label+'</span>';}
      else if(hp&&hs)st='<span class="pill ok">✅ 完整</span>';
      else if(hp&&!hs)st='<span class="pill warn">⚠️ 無銷售</span>';
      else if(!hp&&hs)st='<span class="pill err">❌ 無採購</span>';
      else st='<span class="pill pend">待確認</span>';
      return'<tr>'+DISP.map(function(c){return'<td>'+(r[c]||'-')+'</td>';}).join('')
        +'<td><span class="pill '+(hp?'ok':'pend')+'">'+(hp?'✅':'—')+'</span></td><td>'+st+'</td>'
        +'<td style="font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(etd?fmt(etd):'-')+'</td>'
        +'<td style="font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(eta?fmt(eta):'-')+'</td></tr>';
    }).join('')+'</tbody></table></div>';
  document.getElementById('map-body').innerHTML=mapHTML;

  // ETD/ETA 追蹤（來源：採購/銷售表）
  var ships=[];
  validRows.forEach(function(r){
    var name=r[CASE_COL]||'',sup=r[SUP_COL]||'',cust=r[CUS_COL]||'';
    var etd=parseDate(r[ETD_COL]);if(etd)ships.push({type:'ETD',date:etd,name:name,sup:sup,cust:cust,extra:false});
    var eta=parseDate(r[ETA_COL]);if(eta)ships.push({type:'ETA',date:eta,name:name,sup:sup,cust:cust,extra:false});
  });

  // 合併補充追蹤（欄位與採購表對齊，標注為「補充」）
  try{
    var extUrl='https://docs.google.com/spreadsheets/d/'+NOTES_SHEET_ID+'/export?format=csv&gid='+NOTES_GID+'&t='+Date.now();
    var extRes=await fetch(extUrl);
    if(extRes.ok){
      var extTxt=await extRes.text();
      extTxt.split('\n').forEach(function(line,i){
        if(i===0||!line.trim())return;
        var cols=[];var cur='';var inQ=false;
        for(var j=0;j<line.length;j++){
          var ch=line[j];
          if(ch==='"'){inQ=!inQ;}
          else if(ch===','&&!inQ){cols.push(cur.replace(/^"|"$/g,'').trim());cur='';}
          else cur+=ch;
        }
        cols.push(cur.replace(/^"|"$/g,'').trim());
        // 欄位：id|案件名稱|供應商|客戶|ETD|ETA|出貨地|目的地|備註|回報人|建立時間
        var cName=cols[1]||'(補充)';
        var sup=cols[2]||'';
        var cust=cols[3]||'';
        var etdStr=cols[4]||'';
        var etaStr=cols[5]||'';
        var portFrom=cols[6]||'';
        var portTo=cols[7]||'';
        var note=cols[8]||'';
        var etdDate=parseDate(etdStr);
        var etaDate=parseDate(etaStr);
        if(etdDate){
          ships.push({type:'ETD',date:etdDate,name:cName,sup:sup,cust:cust,
            portFrom:portFrom,portTo:portTo,note:note,extra:true});
        }
        if(etaDate){
          ships.push({type:'ETA',date:etaDate,name:cName,sup:sup,cust:cust,
            portFrom:portFrom,portTo:portTo,note:note,extra:true});
        }
      });
    }
  }catch(e){/* 補充追蹤讀取失敗不影響主要功能 */}

  ships.sort(function(a,b){return a.date-b.date;});
  var now=getToday();
  var todayS=ships.filter(function(e){return sameDay(e.date,T);}),tmrS=ships.filter(function(e){return sameDay(e.date,TM);});
  var overdueS=ships.filter(function(e){return e.date<now;}),upcomingS=ships.filter(function(e){return e.date>=now;});
  var bShip=document.getElementById('b-ship');bShip.textContent=todayS.length+tmrS.length;bShip.className='badge '+((todayS.length+tmrS.length)>0?'hot':'zero');

  function tlHTML(evts){
    return evts.map(function(e){
      var cls=e.date<now?'over':e.type.toLowerCase();
      var extraTag=e.extra
        ?'<span style="font-size:10px;background:rgba(188,140,255,.2);color:var(--purple);padding:1px 6px;border-radius:4px;margin-left:6px;font-family:\'JetBrains Mono\',monospace;vertical-align:middle;">補充</span>'
        :'';
      // 統一用相同格式顯示，補充項目額外顯示備註
      var meta='['+e.type+']';
      meta+=(e.sup?' 供應商: '+e.sup:'');
      meta+=(e.cust?' ｜ 客戶: '+e.cust:'');
      meta+=(e.portFrom?' ｜ 從: '+e.portFrom:'');
      meta+=(e.portTo?' → '+e.portTo:'');
      meta+=(e.note?' ｜ '+e.note:'');
      return '<div class="tli"><div class="tl-dt">'+fmt(e.date)+'</div>'
        +'<div class="tl-ln '+cls+'"></div>'
        +'<div class="tl-b">'
        +'<div class="tl-n">'+e.name+extraTag+'</div>'
        +'<div class="tl-m">'+meta+'</div>'
        +'</div></div>';
    }).join('');
  }

  var upETD=upcomingS.filter(function(e){return e.type==='ETD';}),upETA=upcomingS.filter(function(e){return e.type==='ETA';});
  var shipHTML='<div class="cg" style="margin-bottom:20px"><div class="card today"><div class="card-t">🚢 今日出入貨</div><div class="evl">'+(todayS.length?todayS.map(function(e){return evHTML(e.type,e.name,'');}).join(''):'<div class="empty">✅ 今日無出入貨</div>')+'</div></div>'
    +'<div class="card tmr"><div class="card-t">🚢 明日出入貨</div><div class="evl">'+(tmrS.length?tmrS.map(function(e){return evHTML(e.type,e.name,'');}).join(''):'<div class="empty">✅ 明日無出入貨</div>')+'</div></div></div>';
  if(overdueS.length)shipHTML+='<div class="tls"><div class="tlh" style="color:var(--red)">⚠️ 逾期（'+overdueS.length+'筆）</div>'+tlHTML(overdueS)+'</div>';
  shipHTML+='<div class="tls"><div class="tlh" style="color:var(--blue)">📤 即將出貨 ETD（'+upETD.length+'筆）</div>'+(upETD.length?tlHTML(upETD):'<div class="empty">暫無</div>')+'</div>';
  shipHTML+='<div class="tls"><div class="tlh" style="color:var(--yellow)">📥 即將到貨 ETA（'+upETA.length+'筆）</div>'+(upETA.length?tlHTML(upETA):'<div class="empty">暫無</div>')+'</div>';
  document.getElementById('ship-body').innerHTML=shipHTML;

  var n=new Date();
  document.getElementById('rtime').textContent='最後更新 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

init();
setInterval(init,5*60*1000);
// 初始載入備註（如果在 ship 頁）
setTimeout(function(){
  if(document.getElementById('pane-ship').classList.contains('active'))loadNotes();
},500);
</script>
